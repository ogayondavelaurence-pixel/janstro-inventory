<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goods Receipt (MIGO) - Janstro Solar IMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="assets/css/main.css" rel="stylesheet">
</head>
<body>
    <button class="mobile-menu-toggle" aria-label="Toggle menu"><i class="bi bi-list"></i></button>
    <div id="sidebarContainer"></div>
    <div class="main-content">
        <div class="page-header">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                <div><h1><i class="bi bi-box-arrow-in-down text-success"></i> Goods Receipt (MIGO)</h1><p class="text-muted mb-0">Receive goods from Purchase Orders - Stock IN</p></div>
                <button class="btn btn-primary" onclick="loadPendingPOs()"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
            </div>
        </div>
        <div class="row mb-4 g-3">
            <div class="col-6 col-md-3"><div class="card text-center p-3"><h3 id="statPending" class="text-warning mb-1">0</h3><small>Pending</small></div></div>
            <div class="col-6 col-md-3"><div class="card text-center p-3"><h3 id="statReceived" class="text-success mb-1">0</h3><small>Received Today</small></div></div>
            <div class="col-6 col-md-3"><div class="card text-center p-3"><h3 id="statItems" class="text-info mb-1">0</h3><small>Items Pending</small></div></div>
            <div class="col-6 col-md-3"><div class="card text-center p-3"><h3 id="statValue" class="text-primary mb-1">₱0</h3><small>Pending Value</small></div></div>
        </div>
        <div class="card mb-4"><div class="card-body"><div class="row g-3">
            <div class="col-md-8"><input type="text" id="searchPO" class="form-control" placeholder="🔍 Search PO#, supplier, item..." aria-label="Search"></div>
            <div class="col-md-4"><button class="btn btn-primary w-100" onclick="loadPendingPOs()"><i class="bi bi-search"></i> Search</button></div>
        </div></div></div>
        <div class="card"><div class="card-header"><h3 class="mb-0">📦 Pending Purchase Orders</h3></div><div id="pendingPOList" class="p-3"></div></div>
        <div class="card mt-4"><div class="card-header"><h3 class="mb-0">📋 Recent Receipts</h3></div><div id="recentReceipts"></div></div>
    </div>
    <div class="modal fade" id="receiptModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-success text-white"><h5 class="modal-title">Goods Receipt</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <input type="hidden" id="receiptPOId">
                    <div class="row mb-3"><div class="col-md-6"><label class="form-label fw-bold">PO Number</label><p id="receiptPONumber" class="fs-5 text-primary"></p></div><div class="col-md-6"><label class="form-label fw-bold">Supplier</label><p id="receiptSupplier"></p></div></div>
                    <div class="row mb-3"><div class="col-md-6"><label class="form-label fw-bold">Item</label><p id="receiptItem"></p></div><div class="col-md-6"><label class="form-label fw-bold">Ordered Qty</label><p id="receiptOrderedQty"></p></div></div>
                    <hr>
                    <div class="row"><div class="col-md-6 mb-3"><label for="receivedQty" class="form-label">Received Quantity <span class="text-danger">*</span></label><input type="number" id="receivedQty" class="form-control" min="1" required></div><div class="col-md-6 mb-3"><label class="form-label">Receipt Date</label><input type="date" id="receiptDate" class="form-control" readonly></div></div>
                    <div class="mb-3"><label for="receiptNotes" class="form-label">Notes</label><textarea id="receiptNotes" class="form-control" rows="2"></textarea></div>
                    <div class="alert alert-info mb-0"><i class="bi bi-info-circle"></i> Stock will be updated automatically upon confirmation.</div>
                </div>
                <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button type="button" class="btn btn-success" onclick="confirmReceipt()"><i class="bi bi-check-lg"></i> Confirm Receipt</button></div>
            </div>
        </div>
    </div>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/rbac.js"></script>
    <script src="assets/js/sidebar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let pendingPOs = [], allPOs = [];
        async function initPage() {
            const res = await API.getCurrentUser();
            if (!res?.success) { window.location.href = 'index.html'; return; }
            await loadPendingPOs();
            await loadRecentReceipts();
            document.getElementById('searchPO').addEventListener('input', filterPOs);
        }
        async function loadPendingPOs() {
            Utils.showLoading('pendingPOList');
            try {
                const res = await API.getPurchaseOrders();
                if (res?.success) { allPOs = res.data; pendingPOs = res.data.filter(po => po.status === 'pending' || po.status === 'approved'); renderPendingPOs(pendingPOs); updateStats(); }
            } catch (e) { Utils.showError('pendingPOList', 'Failed to load'); }
        }
        function renderPendingPOs(data) {
            if (!data.length) { document.getElementById('pendingPOList').innerHTML = '<div class="text-center py-5 text-muted"><i class="bi bi-inbox" style="font-size:3rem;"></i><p class="mt-2">No pending POs for receipt</p></div>'; return; }
            let html = '<div class="row g-3">';
            data.forEach(po => {
                html += `<div class="col-12 col-md-6 col-lg-4"><div class="card h-100" style="border-left:4px solid #ffc107;">
                    <div class="card-body">
                        <div class="d-flex justify-content-between mb-2"><h5 class="mb-0">PO-${String(po.po_id).padStart(4,'0')}</h5><span class="badge bg-warning text-dark">${po.status}</span></div>
                        <p class="mb-1"><strong>Supplier:</strong> ${Utils.escapeHtml(po.supplier_name)}</p>
                        <p class="mb-1"><strong>Item:</strong> ${Utils.escapeHtml(po.item_name)}</p>
                        <p class="mb-2"><strong>Qty:</strong> ${po.quantity} | ${Utils.formatCurrency(po.total_amount)}</p>
                        <button class="btn btn-success w-100" onclick="openReceiptModal(${po.po_id})"><i class="bi bi-box-arrow-in-down"></i> Receive</button>
                    </div>
                </div></div>`;
            });
            html += '</div>';
            document.getElementById('pendingPOList').innerHTML = html;
        }
        function updateStats() {
            const today = new Date().toISOString().split('T')[0];
            const received = allPOs.filter(p => p.status === 'delivered' && p.delivered_date?.startsWith(today));
            document.getElementById('statPending').textContent = pendingPOs.length;
            document.getElementById('statReceived').textContent = received.length;
            document.getElementById('statItems').textContent = pendingPOs.reduce((s, p) => s + parseInt(p.quantity), 0);
            document.getElementById('statValue').textContent = Utils.formatCurrency(pendingPOs.reduce((s, p) => s + parseFloat(p.total_amount || 0), 0));
        }
        function filterPOs() {
            const search = document.getElementById('searchPO').value.toLowerCase();
            renderPendingPOs(pendingPOs.filter(po => `PO-${po.po_id}`.toLowerCase().includes(search) || po.supplier_name?.toLowerCase().includes(search) || po.item_name?.toLowerCase().includes(search)));
        }
        function openReceiptModal(poId) {
            const po = pendingPOs.find(p => p.po_id === poId);
            if (!po) return;
            document.getElementById('receiptPOId').value = po.po_id;
            document.getElementById('receiptPONumber').textContent = `PO-${String(po.po_id).padStart(4,'0')}`;
            document.getElementById('receiptSupplier').textContent = po.supplier_name;
            document.getElementById('receiptItem').textContent = po.item_name;
            document.getElementById('receiptOrderedQty').textContent = `${po.quantity} units`;
            document.getElementById('receivedQty').value = po.quantity;
            document.getElementById('receiptDate').value = new Date().toISOString().split('T')[0];
            document.getElementById('receiptNotes').value = '';
            new bootstrap.Modal(document.getElementById('receiptModal')).show();
        }
        async function confirmReceipt() {
            const poId = document.getElementById('receiptPOId').value;
            const qty = parseInt(document.getElementById('receivedQty').value);
            const notes = document.getElementById('receiptNotes').value;
            if (!qty || qty < 1) { Utils.showToast('Enter valid quantity', 'error'); return; }
            try {
                const res = await API.receiveGoods(poId, { received_quantity: qty, notes });
                if (res?.success) { Utils.showToast(`Goods received! New stock: ${res.data.new_stock_level}`, 'success'); bootstrap.Modal.getInstance(document.getElementById('receiptModal')).hide(); loadPendingPOs(); loadRecentReceipts(); }
                else Utils.showToast(res?.message || 'Failed', 'error');
            } catch (e) { Utils.showToast(e.message, 'error'); }
        }
        async function loadRecentReceipts() {
            try {
                const res = await API.getStockMovements({ type: 'IN' });
                if (res?.success && res.data.length) {
                    let html = '<div class="table-responsive"><table class="table table-hover mb-0"><thead><tr><th>Date</th><th>Item</th><th>Qty</th><th>Reference</th></tr></thead><tbody>';
                    res.data.slice(0, 10).forEach(m => { html += `<tr><td>${Utils.formatDate(m.transaction_date)}</td><td>${Utils.escapeHtml(m.item_name)}</td><td><span class="badge bg-success">+${m.quantity}</span></td><td>${Utils.escapeHtml(m.reference_number || '-')}</td></tr>`; });
                    html += '</tbody></table></div>';
                    document.getElementById('recentReceipts').innerHTML = html;
                } else document.getElementById('recentReceipts').innerHTML = '<p class="text-muted text-center py-4">No recent receipts</p>';
            } catch (e) { console.error(e); }
        }
        document.addEventListener('DOMContentLoaded', initPage);
    </script>
</body>
</html>

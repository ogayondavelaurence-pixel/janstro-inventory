<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Janstro Inventory System</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-container {
            max-width: 450px;
            width: 100%;
            padding: 20px;
        }

        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .login-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .login-header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .login-header p {
            font-size: 14px;
            opacity: 0.9;
            margin: 0;
        }

        .login-body {
            padding: 40px 30px;
        }

        .form-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }

        .input-group-text {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-right: none;
            border-radius: 10px 0 0 10px;
        }

        .input-group .form-control {
            border-left: none;
            border-radius: 0 10px 10px 0;
        }

        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px 30px;
            font-weight: 600;
            font-size: 16px;
            width: 100%;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .alert {
            border-radius: 10px;
            border: none;
        }

        .system-info {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            text-align: center;
        }

        .system-info small {
            color: #666;
            display: block;
            margin-bottom: 5px;
        }

        .system-info .badge {
            margin: 0 3px;
        }

        .spinner-border-sm {
            width: 1rem;
            height: 1rem;
            border-width: 0.15em;
        }

        @media (max-width: 576px) {
            .login-container {
                padding: 10px;
            }

            .login-header {
                padding: 30px 20px;
            }

            .login-header h1 {
                font-size: 24px;
            }

            .login-body {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <!-- Login Header -->
            <div class="login-header">
                <i class="bi bi-box-seam" style="font-size: 48px;"></i>
                <h1>Janstro Inventory</h1>
                <p>Enterprise Inventory Management System</p>
            </div>

            <!-- Login Body -->
            <div class="login-body">
                <!-- Error/Success Messages -->
                <div id="alertContainer"></div>

                <!-- Login Form -->
                <form id="loginForm">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-person-fill"></i>
                            </span>
                            <input 
                                type="text" 
                                class="form-control" 
                                id="username" 
                                name="username" 
                                placeholder="Enter username" 
                                required 
                                autocomplete="username"
                                autofocus
                            >
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label">Password</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-lock-fill"></i>
                            </span>
                            <input 
                                type="password" 
                                class="form-control" 
                                id="password" 
                                name="password" 
                                placeholder="Enter password" 
                                required
                                autocomplete="current-password"
                            >
                            <button class="btn btn-outline-secondary" type="button" id="togglePassword" title="Toggle password visibility">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-login" id="loginBtn">
                        <span id="loginBtnText">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Login
                        </span>
                        <span id="loginSpinner" class="d-none">
                            <span class="spinner-border spinner-border-sm me-2"></span>
                            Signing in...
                        </span>
                    </button>
                </form>

                <!-- System Info -->
                <div class="system-info">
                    <small><strong>Default Credentials:</strong></small>
                    <div>
                        <span class="badge bg-primary">admin / admin123</span>
                        <span class="badge bg-secondary">staff1 / staff123</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="text-center mt-4">
            <p class="text-white mb-1">
                <small>© 2025 Janstro Inventory System v2.0.0</small>
            </p>
            <p class="text-white-50 mb-0">
                <small>
                    <i class="bi bi-shield-check me-1"></i>
                    Secure • Immutable Transactions • SAP-Inspired
                </small>
            </p>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- API & Utils -->
    <script src="assets/js/api.js"></script>
    <script src="assets/js/utils.js"></script>

    <script>
        // Check if already logged in
        if (API.isAuthenticated()) {
            window.location.href = 'dashboard.html';
        }

        // Toggle password visibility
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const icon = this.querySelector('i');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('bi-eye');
                icon.classList.add('bi-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('bi-eye-slash');
                icon.classList.add('bi-eye');
            }
        });

        // Handle login form submission
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const alertContainer = document.getElementById('alertContainer');
            const loginBtn = document.getElementById('loginBtn');
            const loginBtnText = document.getElementById('loginBtnText');
            const loginSpinner = document.getElementById('loginSpinner');

            // Validate inputs
            if (!username || !password) {
                showAlert('Please enter both username and password', 'danger');
                return;
            }

            // Clear previous alerts
            alertContainer.innerHTML = '';

            // Disable button and show spinner
            loginBtn.disabled = true;
            loginBtnText.classList.add('d-none');
            loginSpinner.classList.remove('d-none');

            try {
                // Call login API
                console.log('🔐 Attempting login for:', username);
                const response = await API.login(username, password);
                
                console.log('📥 Login response:', response);

                if (response.success) {
                    // Success - Show success message briefly then redirect
                    console.log('✅ Login successful! Token:', response.data.token.substring(0, 20) + '...');
                    showAlert('Login successful! Redirecting...', 'success');
                    
                    setTimeout(() => {
                        console.log('🔀 Redirecting to dashboard...');
                        window.location.href = 'dashboard.html';
                    }, 1000);
                } else {
                    // Failed - Show error
                    console.error('❌ Login failed:', response.message);
                    showAlert(response.message || 'Login failed. Please try again.', 'danger');
                    
                    // Re-enable button
                    loginBtn.disabled = false;
                    loginBtnText.classList.remove('d-none');
                    loginSpinner.classList.add('d-none');
                }
            } catch (error) {
                console.error('💥 Login error:', error);
                showAlert('Connection error. Please check if the server is running.', 'danger');
                
                // Re-enable button
                loginBtn.disabled = false;
                loginBtnText.classList.remove('d-none');
                loginSpinner.classList.add('d-none');
            }
        });

        // Helper function to show alerts
        function showAlert(message, type) {
            const alertContainer = document.getElementById('alertContainer');
            const alertHTML = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    <i class="bi ${type === 'success' ? 'bi-check-circle-fill' : 'bi-exclamation-triangle-fill'} me-2"></i>
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
            alertContainer.innerHTML = alertHTML;
        }

        // Test API health on page load
        (async function testAPI() {
            try {
                const health = await API.healthCheck();
                console.log('✅ API Health:', health);
            } catch (error) {
                console.error('❌ API Connection Failed:', error);
                showAlert(
                    'Warning: Cannot connect to backend API. Please ensure XAMPP is running.',
                    'warning'
                );
            }
        })();
    </script>
</body>
</html>

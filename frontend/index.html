<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Janstro Prime - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            position: relative;
        }

        /* Solar Background */
        .solar-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .sun {
            position: absolute;
            top: 15%;
            right: 15%;
            width: clamp(80px, 15vw, 180px);
            height: clamp(80px, 15vw, 180px);
            background: radial-gradient(circle, #ffd700 0%, #ff8c00 70%, transparent 100%);
            border-radius: 50%;
            animation: pulse 4s ease-in-out infinite;
            box-shadow: 0 0 clamp(40px, 8vw, 80px) rgba(255, 215, 0, 0.8);
        }

        .sun-rays {
            position: absolute;
            top: 15%;
            right: 15%;
            width: clamp(80px, 15vw, 180px);
            height: clamp(80px, 15vw, 180px);
            animation: rotate 20s linear infinite;
        }

        .ray {
            position: absolute;
            top: 50%;
            left: 50%;
            width: clamp(120px, 25vw, 250px);
            height: 3px;
            background: linear-gradient(90deg, rgba(255, 215, 0, 0.8) 0%, transparent 100%);
            transform-origin: 0 0;
        }

        .ray:nth-child(1) { transform: rotate(0deg); }
        .ray:nth-child(2) { transform: rotate(45deg); }
        .ray:nth-child(3) { transform: rotate(90deg); }
        .ray:nth-child(4) { transform: rotate(135deg); }
        .ray:nth-child(5) { transform: rotate(180deg); }
        .ray:nth-child(6) { transform: rotate(225deg); }
        .ray:nth-child(7) { transform: rotate(270deg); }
        .ray:nth-child(8) { transform: rotate(315deg); }

        .solar-panel {
            position: absolute;
            width: clamp(60px, 10vw, 100px);
            height: clamp(40px, 6vw, 60px);
            background: linear-gradient(135deg, #1e3a5f 0%, #2c5f8d 100%);
            border: 2px solid #4a7fa7;
            border-radius: 6px;
            animation: float 8s ease-in-out infinite;
            opacity: 0.6;
        }

        .panel-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 2px;
            padding: 4px;
            height: 100%;
        }

        .panel-cell {
            background: rgba(100, 150, 200, 0.3);
            border: 1px solid rgba(150, 200, 255, 0.4);
        }

        .panel-1 { bottom: 20%; left: 10%; animation-delay: 0s; }
        .panel-2 { bottom: 40%; left: 5%; animation-delay: 1.5s; }
        .panel-3 { bottom: 60%; right: 10%; animation-delay: 3s; }
        .panel-4 { top: 30%; right: 20%; animation-delay: 4.5s; }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.15); opacity: 0.85; }
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        /* Login Container - FULLY RESPONSIVE */
        .login-container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: clamp(10px, 3vw, 20px);
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: clamp(16px, 4vw, 28px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: min(480px, 95vw);
            overflow: hidden;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .login-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: clamp(30px, 6vw, 50px) clamp(20px, 4vw, 35px);
            text-align: center;
            color: white;
        }

        .logo-icon {
            font-size: clamp(48px, 10vw, 72px);
            margin-bottom: clamp(10px, 2vw, 15px);
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .login-header h1 {
            font-size: clamp(24px, 5vw, 32px);
            font-weight: 800;
            margin: clamp(10px, 2vw, 15px) 0 clamp(5px, 1vw, 8px);
        }

        .login-header p {
            font-size: clamp(13px, 2.5vw, 15px);
            opacity: 0.95;
            margin: 0;
        }

        .login-body {
            padding: clamp(25px, 5vw, 45px) clamp(20px, 4vw, 40px);
        }

        .form-group {
            margin-bottom: clamp(18px, 3vw, 28px);
        }

        .form-label {
            display: block;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: clamp(6px, 1.5vw, 10px);
            font-size: clamp(13px, 2.5vw, 15px);
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: clamp(12px, 2.5vw, 18px);
            top: 50%;
            transform: translateY(-50%);
            color: #667eea;
            font-size: clamp(16px, 3vw, 20px);
            z-index: 2;
        }

        .form-control {
            width: 100%;
            padding: clamp(12px, 2.5vw, 16px) clamp(15px, 3vw, 20px) clamp(12px, 2.5vw, 16px) clamp(42px, 7vw, 54px);
            border: 2px solid #e8ecf1;
            border-radius: clamp(10px, 2vw, 14px);
            font-size: clamp(14px, 2.5vw, 16px);
            transition: all 0.3s;
            background: #f8f9fb;
        }

        .form-control:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.12);
        }

        .password-toggle {
            position: absolute;
            right: clamp(12px, 2.5vw, 18px);
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #6c757d;
            cursor: pointer;
            padding: 8px;
            font-size: clamp(16px, 3vw, 20px);
            z-index: 2;
            border-radius: 8px;
        }

        .password-toggle:hover {
            color: #667eea;
            background: rgba(102, 126, 234, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: clamp(12px, 2.5vw, 16px);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: clamp(10px, 2vw, 14px);
            font-size: clamp(15px, 2.5vw, 17px);
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: clamp(10px, 2vw, 15px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-login:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(102, 126, 234, 0.5);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .credentials-box {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: clamp(10px, 2vw, 14px);
            padding: clamp(15px, 3vw, 20px);
            margin-top: clamp(18px, 3vw, 28px);
            border: 2px solid #dee2e6;
        }

        .credentials-box small {
            display: block;
            text-align: center;
            color: #495057;
            font-weight: 700;
            margin-bottom: clamp(10px, 2vw, 14px);
            font-size: clamp(12px, 2vw, 14px);
        }

        .credential-item {
            display: inline-block;
            background: white;
            padding: clamp(8px, 1.5vw, 10px) clamp(12px, 2vw, 18px);
            border-radius: clamp(8px, 1.5vw, 10px);
            margin: clamp(4px, 1vw, 6px);
            font-size: clamp(11px, 2vw, 13px);
            font-weight: 700;
            color: #667eea;
            border: 2px solid #e8ecf1;
            transition: all 0.3s;
            cursor: pointer;
        }

        .credential-item:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(102, 126, 234, 0.4);
        }

        .footer-text {
            text-align: center;
            margin-top: clamp(20px, 4vw, 40px);
            color: rgba(255, 255, 255, 0.95);
            font-size: clamp(12px, 2vw, 14px);
            padding: 0 clamp(10px, 2vw, 20px);
        }

        .footer-text i {
            color: #ffd700;
            margin: 0 4px;
        }

        .footer-subtext {
            font-size: clamp(11px, 1.8vw, 13px);
            opacity: 0.85;
            margin-top: clamp(8px, 1.5vw, 10px);
        }

        .alert {
            border-radius: clamp(10px, 2vw, 14px);
            border: none;
            padding: clamp(12px, 2.5vw, 16px) clamp(15px, 3vw, 20px);
            margin-bottom: clamp(18px, 3vw, 24px);
            font-size: clamp(13px, 2vw, 15px);
            animation: slideDown 0.5s;
        }

        @keyframes slideDown {
            from { transform: translateY(-10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Extreme Mobile (240p - 320px) */
        @media (max-width: 320px) {
            .login-card {
                border-radius: 12px;
                margin: 5px;
            }
            .login-header {
                padding: 20px 15px;
            }
            .login-body {
                padding: 20px 15px;
            }
            .credential-item {
                display: block;
                margin: 5px 0;
                text-align: center;
            }
            .sun, .sun-rays {
                width: 60px;
                height: 60px;
            }
            .solar-panel {
                width: 50px;
                height: 35px;
            }
        }

        /* Small Mobile (321px - 480px) */
        @media (min-width: 321px) and (max-width: 480px) {
            .login-card {
                max-width: 90vw;
            }
        }

        /* Medium Mobile (481px - 768px) */
        @media (min-width: 481px) and (max-width: 768px) {
            .login-card {
                max-width: 85vw;
            }
        }

        /* Tablet (769px - 1024px) */
        @media (min-width: 769px) and (max-width: 1024px) {
            .login-card {
                max-width: 500px;
            }
        }

        /* Desktop (1025px - 1920px) */
        @media (min-width: 1025px) and (max-width: 1920px) {
            .login-card {
                max-width: 480px;
            }
        }

        /* 4K+ (1921px+) */
        @media (min-width: 1921px) {
            .login-card {
                max-width: 600px;
            }
            .login-header {
                padding: 60px 45px;
            }
            .login-body {
                padding: 55px 50px;
            }
            .form-control {
                font-size: 18px;
                padding: 18px 22px 18px 60px;
            }
            .btn-login {
                font-size: 19px;
                padding: 18px;
            }
        }

        /* Landscape Mobile */
        @media (max-height: 500px) and (orientation: landscape) {
            .login-container {
                padding: 10px;
            }
            .login-header {
                padding: 15px 20px;
            }
            .logo-icon {
                font-size: 40px;
                margin-bottom: 5px;
            }
            .login-header h1 {
                font-size: 20px;
                margin: 8px 0 5px;
            }
            .login-body {
                padding: 15px 20px;
            }
            .form-group {
                margin-bottom: 12px;
            }
            .credentials-box {
                margin-top: 12px;
                padding: 10px;
            }
            .footer-text {
                margin-top: 15px;
            }
        }
    </style>
</head>
<body>
    <!-- Solar Background -->
    <div class="solar-background">
        <div class="sun"></div>
        <div class="sun-rays">
            <div class="ray"></div>
            <div class="ray"></div>
            <div class="ray"></div>
            <div class="ray"></div>
            <div class="ray"></div>
            <div class="ray"></div>
            <div class="ray"></div>
            <div class="ray"></div>
        </div>
        
        <div class="solar-panel panel-1">
            <div class="panel-grid">
                <div class="panel-cell"></div>
                <div class="panel-cell"></div>
                <div class="panel-cell"></div>
                <div class="panel-cell"></div>
                <div class="panel-cell"></div>
                <div class="panel-cell"></div>
            </div>
        </div>
        <div class="solar-panel panel-2">
            <div class="panel-grid">
                <div class="panel-cell"></div>
                <div class="panel-cell"></div>
                <div class="panel-cell"></div>
                <div class="panel-cell"></div>
                <div class="panel-cell"></div>
                <div class="panel-cell"></div>
            </div>
        </div>
        <div class="solar-panel panel-3">
            <div class="panel-grid">
                <div class="panel-cell"></div>
                <div class="panel-cell"></div>
                <div class="panel-cell"></div>
                <div class="panel-cell"></div>
                <div class="panel-cell"></div>
                <div class="panel-cell"></div>
            </div>
        </div>
        <div class="solar-panel panel-4">
            <div class="panel-grid">
                <div class="panel-cell"></div>
                <div class="panel-cell"></div>
                <div class="panel-cell"></div>
                <div class="panel-cell"></div>
                <div class="panel-cell"></div>
                <div class="panel-cell"></div>
            </div>
        </div>
    </div>

    <!-- Login Container -->
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-icon">☀️</div>
                <h1>Janstro Prime</h1>
                <p>Renewable Energy Solutions</p>
            </div>

            <div class="login-body">
                <div id="alertContainer"></div>

                <form id="loginForm" novalidate>
                    <div class="form-group">
                        <label class="form-label">Username</label>
                        <div class="input-wrapper">
                            <i class="bi bi-person-fill input-icon"></i>
                            <input 
                                type="text" 
                                class="form-control" 
                                id="username" 
                                placeholder="Enter username"
                                autocomplete="username"
                                required
                            >
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <div class="input-wrapper">
                            <i class="bi bi-lock-fill input-icon"></i>
                            <input 
                                type="password" 
                                class="form-control" 
                                id="password" 
                                placeholder="Enter password"
                                autocomplete="current-password"
                                required
                            >
                            <button type="button" class="password-toggle" id="togglePassword" aria-label="Toggle password">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn-login" id="loginBtn">
                        <span id="loginText">
                            <i class="bi bi-box-arrow-in-right"></i>
                            Sign In
                        </span>
                    </button>
                </form>

                <div class="credentials-box">
                    <small><i class="bi bi-info-circle"></i> Test Credentials</small>
                    <div style="text-align: center;">
                        <span class="credential-item" onclick="fillCredentials('admin', 'admin123')">
                            <i class="bi bi-shield-check"></i> Admin
                        </span>
                        <span class="credential-item" onclick="fillCredentials('superadmin', 'admin123')">
                            <i class="bi bi-star"></i> Super
                        </span>
                        <span class="credential-item" onclick="fillCredentials('staff1', 'admin123')">
                            <i class="bi bi-person"></i> Staff
                        </span>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer-text">
            <p><i class="bi bi-sun"></i> Powering Tomorrow with Clean Energy Today</p>
            <p class="footer-subtext">
                © 2025 Janstro Prime Renewable Energy Solutions
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/api.js"></script>
    
    <script>
        // Password toggle
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const icon = this.querySelector('i');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('bi-eye');
                icon.classList.add('bi-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('bi-eye-slash');
                icon.classList.add('bi-eye');
            }
        });

        // Fill credentials
        function fillCredentials(username, password) {
            document.getElementById('username').value = username;
            document.getElementById('password').value = password;
        }

        // Handle login
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const loginText = document.getElementById('loginText');

            if (!username || !password) {
                showAlert('Please enter both username and password', 'danger');
                return;
            }

            // Disable button
            loginBtn.disabled = true;
            loginText.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Signing in...';

            try {
                console.log("🔐 Attempting login as:", username);
                
                const response = await API.login(username, password);
                
                console.log("📥 Login response received:", response);
                
                if (response && response.success) {
                    showAlert('✅ Login successful! Redirecting...', 'success');
                    
                    // Verify token was stored
                    const storedToken = API.getToken();
                    const storedUser = API.getUser();
                    
                    console.log("✅ Token stored:", !!storedToken);
                    console.log("✅ User stored:", !!storedUser);
                    
                    if (!storedToken || !storedUser) {
                        showAlert('❌ Session storage failed. Please try again.', 'danger');
                        loginBtn.disabled = false;
                        loginText.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Sign In';
                        return;
                    }
                    
                    // Wait briefly to show success message
                    setTimeout(() => {
                        console.log("🔄 Redirecting to dashboard...");
                        window.location.href = 'dashboard.html';
                    }, 1000);
                } else {
                    const errorMsg = (response && response.message) || 'Invalid credentials';
                    showAlert(errorMsg, 'danger');
                    loginBtn.disabled = false;
                    loginText.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Sign In';
                }
            } catch (error) {
                console.error('❌ Login error:', error);
                showAlert('Connection error. Please check if backend is running.', 'danger');
                loginBtn.disabled = false;
                loginText.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Sign In';
            }
        });

        function showAlert(message, type) {
            const alertContainer = document.getElementById('alertContainer');
            const iconClass = type === 'success' ? 'bi-check-circle-fill' : 'bi-exclamation-triangle-fill';
            
            alertContainer.innerHTML = `
                <div class="alert alert-${type}" role="alert">
                    <i class="bi ${iconClass}"></i> ${message}
                </div>
            `;

            if (type === 'success') {
                setTimeout(() => {
                    alertContainer.innerHTML = '';
                }, 3000);
            }
        }

        // Check if already logged in
        if (API.isAuthenticated()) {
            console.log("✅ Already authenticated, redirecting to dashboard");
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>

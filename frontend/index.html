<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Janstro Prime - Login</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/css/login.css" rel="stylesheet">
</head>
<body>
    <div class="solar-background" aria-hidden="true">
        <div class="sun"></div>
        <div class="solar-panel panel-1"></div>
        <div class="solar-panel panel-2"></div>
        <div class="solar-panel panel-3"></div>
    </div>

    <main class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo" aria-hidden="true">☀️</div>
                <h1 class="login-title">Janstro Prime</h1>
                <p class="login-subtitle">Renewable Energy Solutions</p>
            </div>

            <div class="login-body">
                <div id="errorAlert" class="alert alert-danger d-none" role="alert">
                    <span aria-live="polite">❌ Invalid credentials</span>
                </div>

                <form id="loginForm" novalidate>
                    <div class="form-group">
                        <label for="username" class="form-label">Username</label>
                        <div class="input-group">
                            <span class="input-icon" aria-hidden="true">👤</span>
                            <input type="text" id="username" name="username" class="form-control" 
                                   placeholder="Enter username" required autocomplete="username" aria-label="Username">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password" class="form-label">Password</label>
                        <div class="input-group">
                            <span class="input-icon" aria-hidden="true">🔒</span>
                            <input type="password" id="password" name="password" class="form-control" 
                                   placeholder="Enter password" required autocomplete="current-password" aria-label="Password">
                            <button type="button" class="toggle-password" id="togglePassword" aria-label="Toggle password visibility">
                                <span aria-hidden="true">👁️</span>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn-signin" id="signInBtn">
                        <span aria-hidden="true">🔑</span>
                        <span>Sign In</span>
                    </button>
                </form>

                <!-- Inquiry Link Section -->
                <div class="inquiry-link-section">
                    <p class="inquiry-text">Want to install solar panels?</p>
                    <a href="inquiry.html" class="btn-inquiry">
                        <span aria-hidden="true">☀️</span>
                        <span>Install Solar Panel Now</span>
                    </a>
                </div>

                <div class="test-credentials">
                    <div class="test-credentials-header">
                        <span aria-hidden="true">ℹ️</span>
                        <span>Test Credentials</span>
                    </div>
                    <div class="test-buttons" role="group" aria-label="Quick login test credentials">
                        <button type="button" class="btn-test" data-username="staff" data-password="staff123" aria-label="Login as staff">
                            <span aria-hidden="true">👨‍💼</span>
                            <span>Staff</span>
                        </button>
                        <button type="button" class="btn-test" data-username="admin" data-password="admin123" aria-label="Login as admin">
                            <span aria-hidden="true">👔</span>
                            <span>Admin</span>
                        </button>
                        <button type="button" class="btn-test" data-username="superadmin" data-password="superadmin123" aria-label="Login as superadmin">
                            <span aria-hidden="true">⭐</span>
                            <span>Super</span>
                        </button>
                    </div>
                </div>

                <div class="footer-text">Secure login protected by encryption</div>
            </div>
        </div>
    </main>

    <script src="assets/js/api.js"></script>
    <script>
        function waitForAPI(callback, timeout = 5000) {
            const start = Date.now();
            const check = setInterval(() => {
                if (typeof API !== 'undefined') {
                    clearInterval(check);
                    callback();
                } else if (Date.now() - start > timeout) {
                    clearInterval(check);
                    alert('System Error: API failed to load. Please refresh.');
                }
            }, 100);
        }

        function initLogin() {
            if (API?.isAuthenticated()) {
                window.location.href = 'dashboard.html';
                return;
            }

            const form = document.getElementById('loginForm');
            const username = document.getElementById('username');
            const password = document.getElementById('password');
            const errorAlert = document.getElementById('errorAlert');
            const signInBtn = document.getElementById('signInBtn');
            const togglePwd = document.getElementById('togglePassword');

            togglePwd.addEventListener('click', () => {
                const type = password.type === 'password' ? 'text' : 'password';
                password.type = type;
                togglePwd.querySelector('span').textContent = type === 'password' ? '👁️' : '🙈';
            });

            document.querySelectorAll('.btn-test').forEach(btn => {
                btn.addEventListener('click', () => {
                    username.value = btn.dataset.username;
                    password.value = btn.dataset.password;
                    errorAlert.classList.add('d-none');
                });
            });

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                errorAlert.classList.add('d-none');

                const u = username.value.trim();
                const p = password.value.trim();

                if (!u || !p) {
                    errorAlert.querySelector('span').textContent = '⚠️ Please enter both username and password';
                    errorAlert.classList.remove('d-none');
                    return;
                }

                signInBtn.disabled = true;
                signInBtn.innerHTML = '<span>⏳</span><span>Signing in...</span>';

                try {
                    const response = await API.login(u, p);
                    if (response?.success) {
                        signInBtn.innerHTML = '<span>✅</span><span>Success!</span>';
                        setTimeout(() => window.location.href = 'dashboard.html', 500);
                    } else {
                        throw new Error('Invalid credentials');
                    }
                } catch (err) {
                    errorAlert.querySelector('span').textContent = '❌ Invalid username or password';
                    errorAlert.classList.remove('d-none');
                    signInBtn.disabled = false;
                    signInBtn.innerHTML = '<span>🔑</span><span>Sign In</span>';
                }
            });
        }

        waitForAPI(initLogin);
    </script>
</body>
</html>

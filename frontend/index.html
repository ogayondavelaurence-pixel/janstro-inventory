<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Janstro Prime - Renewable Energy Solutions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
        }

        /* Solar Background Animation */
        .solar-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080"><defs><linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:%230a1128;stop-opacity:1" /><stop offset="100%" style="stop-color:%231a2332;stop-opacity:1" /></linearGradient></defs><rect fill="url(%23sky)" width="1920" height="1080"/></svg>') no-repeat center center;
            background-size: cover;
        }

        /* Animated Sun */
        .sun {
            position: absolute;
            top: 15%;
            right: 15%;
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, #ffd700 0%, #ff8c00 70%, transparent 100%);
            border-radius: 50%;
            animation: pulse 4s ease-in-out infinite;
            box-shadow: 0 0 80px rgba(255, 215, 0, 0.8), 0 0 120px rgba(255, 140, 0, 0.6);
        }

        .sun-rays {
            position: absolute;
            top: 15%;
            right: 15%;
            width: 180px;
            height: 180px;
            animation: rotate 20s linear infinite;
        }

        .ray {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 250px;
            height: 3px;
            background: linear-gradient(90deg, rgba(255, 215, 0, 0.8) 0%, transparent 100%);
            transform-origin: 0 0;
        }

        .ray:nth-child(1) { transform: rotate(0deg); }
        .ray:nth-child(2) { transform: rotate(45deg); }
        .ray:nth-child(3) { transform: rotate(90deg); }
        .ray:nth-child(4) { transform: rotate(135deg); }
        .ray:nth-child(5) { transform: rotate(180deg); }
        .ray:nth-child(6) { transform: rotate(225deg); }
        .ray:nth-child(7) { transform: rotate(270deg); }
        .ray:nth-child(8) { transform: rotate(315deg); }

        /* Solar Panels Floating */
        .solar-panel {
            position: absolute;
            width: 100px;
            height: 60px;
            background: linear-gradient(135deg, #1e3a5f 0%, #2c5f8d 100%);
            border: 3px solid #4a7fa7;
            border-radius: 6px;
            animation: float 8s ease-in-out infinite;
            opacity: 0.6;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .panel-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 2px;
            padding: 4px;
        }

        .panel-cell {
            background: rgba(100, 150, 200, 0.3);
            border: 1px solid rgba(150, 200, 255, 0.4);
        }

        .panel-1 { bottom: 20%; left: 10%; animation-delay: 0s; }
        .panel-2 { bottom: 40%; left: 5%; animation-delay: 1.5s; }
        .panel-3 { bottom: 60%; right: 10%; animation-delay: 3s; }
        .panel-4 { top: 30%; right: 20%; animation-delay: 4.5s; }

        /* Energy Particles */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 215, 0, 0.8);
            border-radius: 50%;
            animation: float-particle 12s linear infinite;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.6);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.15); opacity: 0.85; }
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(8deg); }
        }

        @keyframes float-particle {
            0% { transform: translateY(120vh) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-20vh) translateX(80px); opacity: 0; }
        }

        /* Login Container */
        .login-container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.98);
            -webkit-backdrop-filter: blur(30px);
            backdrop-filter: blur(30px);
            border-radius: 28px;
            box-shadow: 0 30px 100px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.1);
            max-width: 480px;
            width: 100%;
            overflow: hidden;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .login-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 50px 35px;
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .login-header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);
            animation: shimmer 4s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(40px, 40px); }
        }

        .logo-icon {
            font-size: 72px;
            margin-bottom: 15px;
            animation: bounce 2s ease-in-out infinite;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .login-header h1 {
            font-size: 32px;
            font-weight: 800;
            margin: 15px 0 8px;
            position: relative;
            letter-spacing: -0.5px;
        }

        .login-header p {
            font-size: 15px;
            opacity: 0.95;
            margin: 0;
            font-weight: 500;
        }

        .login-body {
            padding: 45px 40px;
        }

        .form-group {
            margin-bottom: 28px;
        }

        .form-label {
            display: block;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 15px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #667eea;
            font-size: 20px;
            z-index: 2;
        }

        .form-control {
            width: 100%;
            padding: 16px 20px 16px 54px;
            border: 2px solid #e8ecf1;
            border-radius: 14px;
            font-size: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: #f8f9fb;
        }

        .form-control:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 6px rgba(102, 126, 234, 0.12);
            transform: translateY(-2px);
        }

        .password-toggle {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #6c757d;
            cursor: pointer;
            padding: 8px;
            font-size: 20px;
            z-index: 2;
            transition: all 0.3s;
            border-radius: 8px;
        }

        .password-toggle:hover {
            color: #667eea;
            background: rgba(102, 126, 234, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 15px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        .btn-login::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn-login:hover::before {
            width: 400px;
            height: 400px;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.5);
        }

        .btn-login:active {
            transform: translateY(-1px);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .btn-login .spinner-border {
            width: 20px;
            height: 20px;
            border-width: 2px;
        }

        .credentials-box {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 14px;
            padding: 20px;
            margin-top: 28px;
            border: 2px solid #dee2e6;
        }

        .credentials-box small {
            display: block;
            text-align: center;
            color: #495057;
            font-weight: 700;
            margin-bottom: 14px;
            font-size: 14px;
        }

        .credential-item {
            display: inline-block;
            background: white;
            padding: 10px 18px;
            border-radius: 10px;
            margin: 6px;
            font-size: 13px;
            font-weight: 700;
            color: #667eea;
            border: 2px solid #e8ecf1;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .credential-item:hover {
            background: #667eea;
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .footer-text {
            text-align: center;
            margin-top: 40px;
            color: rgba(255, 255, 255, 0.95);
            font-size: 14px;
            font-weight: 500;
        }

        .footer-text i {
            color: #ffd700;
            margin: 0 6px;
        }

        .footer-subtext {
            font-size: 13px;
            opacity: 0.85;
            margin-top: 10px;
        }

        .alert {
            border-radius: 14px;
            border: none;
            padding: 16px 20px;
            margin-bottom: 24px;
            font-size: 15px;
            animation: slideDown 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 600;
        }

        @keyframes slideDown {
            from { transform: translateY(-15px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @media (max-width: 576px) {
            .login-card {
                margin: 15px;
                border-radius: 24px;
            }

            .login-header {
                padding: 40px 25px;
            }

            .login-header h1 {
                font-size: 28px;
            }

            .login-body {
                padding: 35px 30px;
            }

            .sun {
                width: 120px;
                height: 120px;
                top: 8%;
                right: 8%;
            }

            .sun-rays {
                width: 120px;
                height: 120px;
            }

            .ray {
                width: 180px;
            }

            .solar-panel {
                width: 80px;
                height: 50px;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Solar Background -->
    <div class="solar-background">
        <div class="sun"></div>
        <div class="sun-rays">
            <div class="ray"></div>
            <div class="ray"></div>
            <div class="ray"></div>
            <div class="ray"></div>
            <div class="ray"></div>
            <div class="ray"></div>
            <div class="ray"></div>
            <div class="ray"></div>
        </div>
        
        <div class="solar-panel panel-1">
            <div class="panel-grid">
                <div class="panel-cell"></div>
                <div class="panel-cell"></div>
                <div class="panel-cell"></div>
                <div class="panel-cell"></div>
                <div class="panel-cell"></div>
                <div class="panel-cell"></div>
            </div>
        </div>
        <div class="solar-panel panel-2">
            <div class="panel-grid">
                <div class="panel-cell"></div>
                <div class="panel-cell"></div>
                <div class="panel-cell"></div>
                <div class="panel-cell"></div>
                <div class="panel-cell"></div>
                <div class="panel-cell"></div>
            </div>
        </div>
        <div class="solar-panel panel-3">
            <div class="panel-grid">
                <div class="panel-cell"></div>
                <div class="panel-cell"></div>
                <div class="panel-cell"></div>
                <div class="panel-cell"></div>
                <div class="panel-cell"></div>
                <div class="panel-cell"></div>
            </div>
        </div>
        <div class="solar-panel panel-4">
            <div class="panel-grid">
                <div class="panel-cell"></div>
                <div class="panel-cell"></div>
                <div class="panel-cell"></div>
                <div class="panel-cell"></div>
                <div class="panel-cell"></div>
                <div class="panel-cell"></div>
            </div>
        </div>
    </div>

    <!-- Login Container -->
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-icon">☀️</div>
                <h1>Janstro Prime</h1>
                <p>Renewable Energy Solutions</p>
            </div>

            <div class="login-body">
                <div id="alertContainer"></div>

                <form id="loginForm" novalidate>
                    <div class="form-group">
                        <label class="form-label">Username</label>
                        <div class="input-wrapper">
                            <i class="bi bi-person-fill input-icon"></i>
                            <input 
                                type="text" 
                                class="form-control" 
                                id="username" 
                                placeholder="Enter your username"
                                autocomplete="username"
                                required
                            >
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <div class="input-wrapper">
                            <i class="bi bi-lock-fill input-icon"></i>
                            <input 
                                type="password" 
                                class="form-control" 
                                id="password" 
                                placeholder="Enter your password"
                                autocomplete="current-password"
                                required
                            >
                            <button type="button" class="password-toggle" id="togglePassword" aria-label="Toggle password visibility">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn-login" id="loginBtn">
                        <span id="loginText">
                            <i class="bi bi-box-arrow-in-right"></i>
                            Sign In
                        </span>
                    </button>
                </form>

                <div class="credentials-box">
                    <small><i class="bi bi-info-circle"></i> Test Credentials</small>
                    <div class="text-center">
                        <span class="credential-item" onclick="fillCredentials('admin', 'admin123')">
                            <i class="bi bi-shield-check"></i> Admin
                        </span>
                        <span class="credential-item" onclick="fillCredentials('staff1', 'admin123')">
                            <i class="bi bi-person"></i> Staff
                        </span>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer-text">
            <p><i class="bi bi-sun"></i> Powering Tomorrow with Clean Energy Today</p>
            <p class="footer-subtext">
                © 2025 Janstro Prime Renewable Energy Solutions Corporation
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/rbac.js"></script>
    
    <script>
          // Enforce RBAC on page load
        document.addEventListener('DOMContentLoaded', () => {
        RBAC.init();
        });

        // Check auth
        if (!API.isAuthenticated()) {
            window.location.href = 'index.html';
        }
        
        // Generate floating particles
        function createParticles() {
            const container = document.querySelector('.solar-background');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 12 + 's';
                particle.style.animationDuration = (12 + Math.random() * 12) + 's';
                container.appendChild(particle);
            }
        }
        createParticles();

        // Password toggle
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const icon = this.querySelector('i');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('bi-eye');
                icon.classList.add('bi-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('bi-eye-slash');
                icon.classList.add('bi-eye');
            }
        });

        // Fill credentials
        function fillCredentials(username, password) {
            document.getElementById('username').value = username;
            document.getElementById('password').value = password;
            document.getElementById('username').dispatchEvent(new Event('input'));
        }

        // API Configuration - FIXED: Remove double port
        const API = {
            baseURL: window.location.origin.replace(':8080', '') + ":8080/janstro-inventory/public",
            
            async login(username, password) {
                const response = await fetch(`${this.baseURL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                return response.json();
            }
        };

        // Handle login
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const loginText = document.getElementById('loginText');

            if (!username || !password) {
                showAlert('Please enter both username and password', 'danger');
                return;
            }

            // Disable button and show loading
            loginBtn.disabled = true;
            loginText.innerHTML = '<span class="spinner-border"></span> Signing in...';

            try {
                const response = await API.login(username, password);
                
                if (response.success) {
                    showAlert('Login successful! Redirecting...', 'success');
                    
                    // Store credentials
                    localStorage.setItem('janstro_token', response.data.token);
                    localStorage.setItem('janstro_user', JSON.stringify(response.data.user));
                    
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1000);
                } else {
                    showAlert(response.message || 'Login failed', 'danger');
                    loginBtn.disabled = false;
                    loginText.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Sign In';
                }
            } catch (error) {
                console.error('Login error:', error);
                showAlert('Connection error. Please ensure the backend is running.', 'danger');
                loginBtn.disabled = false;
                loginText.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Sign In';
            }
        });

        function showAlert(message, type) {
            const alertContainer = document.getElementById('alertContainer');
            const iconClass = type === 'success' ? 'bi-check-circle-fill' : 'bi-exclamation-triangle-fill';
            
            alertContainer.innerHTML = `
                <div class="alert alert-${type}" role="alert">
                    <i class="bi ${iconClass}"></i> ${message}
                </div>
            `;

            if (type === 'success') {
                setTimeout(() => {
                    alertContainer.innerHTML = '';
                }, 3000);
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Janstro Inventory System [DEBUG VERSION]</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 10px;
        }
        .login-container { width: 100%; max-width: 450px; padding: 0 15px; }
        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        .login-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }
        .login-header i { font-size: 48px; margin-bottom: 10px; }
        .login-header h1 { font-size: 28px; font-weight: 700; margin-bottom: 10px; }
        .login-body { padding: 40px 30px; }
        .form-label { font-weight: 600; color: #333; margin-bottom: 8px; font-size: 14px; }
        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            transition: all 0.3s ease;
            font-size: 16px;
            width: 100%;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .input-group { display: flex; align-items: stretch; width: 100%; }
        .input-group-text {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-right: none;
            border-radius: 10px 0 0 10px;
            padding: 0 15px;
            display: flex;
            align-items: center;
        }
        .input-group .form-control {
            border-left: none;
            border-radius: 0 10px 10px 0;
            flex: 1;
        }
        .btn-toggle-password {
            background: transparent;
            border: none;
            padding: 0 10px;
            cursor: pointer;
            color: #666;
        }
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px 30px;
            font-weight: 600;
            font-size: 16px;
            width: 100%;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .btn-login:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        .btn-login:disabled { opacity: 0.7; cursor: not-allowed; }
        .system-info {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            text-align: center;
        }
        .system-info small { color: #666; display: block; margin-bottom: 5px; font-size: 12px; }
        .system-info .badge { margin: 3px; font-size: 11px; padding: 5px 10px; }
        .footer-text {
            text-align: center;
            margin-top: 20px;
            color: white;
        }
        .footer-text p { margin-bottom: 5px; font-size: 13px; }
        .alert { border-radius: 10px; border: none; margin-bottom: 15px; font-size: 14px; padding: 10px 15px; }
        .spinner-border-sm { width: 1rem; height: 1rem; border-width: 0.15em; }
        
        /* Debug Console */
        #debugConsole {
            background: #1e1e1e;
            color: #00ff00;
            padding: 15px;
            border-radius: 10px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            margin-top: 20px;
            display: none;
        }
        #debugConsole.show { display: block; }
        .debug-line { margin: 2px 0; }
        .debug-error { color: #ff4444; }
        .debug-success { color: #00ff00; }
        .debug-info { color: #00bfff; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <i class="bi bi-box-seam"></i>
                <h1>Janstro Inventory</h1>
                <p>Enterprise Inventory Management System</p>
            </div>

            <div class="login-body">
                <div id="alertContainer"></div>

                <form id="loginForm">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-person-fill"></i>
                            </span>
                            <input 
                                type="text" 
                                class="form-control" 
                                id="username" 
                                name="username" 
                                placeholder="Enter username" 
                                required 
                                autocomplete="username"
                                value="admin"
                            >
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label">Password</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-lock-fill"></i>
                            </span>
                            <input 
                                type="password" 
                                class="form-control" 
                                id="password" 
                                name="password" 
                                placeholder="Enter password" 
                                required
                                autocomplete="current-password"
                                value="admin123"
                            >
                            <button class="btn-toggle-password" type="button" id="togglePassword" aria-label="Toggle password visibility" title="Show/Hide Password">
                                <i class="bi bi-eye"></i>
                            </button>

                        </div>
                    </div>

                    <button type="submit" class="btn-login" id="loginBtn">
                        <span id="loginBtnText">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Login
                        </span>
                        <span id="loginSpinner" class="d-none">
                            <span class="spinner-border spinner-border-sm me-2"></span>
                            Signing in...
                        </span>
                    </button>
                </form>

                <div class="system-info">
                    <small><strong>Default Credentials:</strong></small>
                    <div>
                        <span class="badge bg-primary">admin / admin123</span>
                        <span class="badge bg-secondary">staff1 / staff123</span>
                    </div>
                </div>

                <!-- DEBUG CONSOLE -->
                <div id="debugConsole" class="show">
                    <div class="debug-line debug-info">🔍 Debug Console - Watch for errors here</div>
                </div>
            </div>
        </div>

        <div class="footer-text">
            <p><small>© 2025 Janstro Inventory System v2.0.0</small></p>
            <p><small><i class="bi bi-shield-check me-1"></i>Secure • Immutable Transactions • SAP-Inspired</small></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // DEBUG CONSOLE
        const debugConsole = document.getElementById('debugConsole');
        function debugLog(message, type = 'info') {
            const line = document.createElement('div');
            line.className = `debug-line debug-${type}`;
            line.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            debugConsole.appendChild(line);
            debugConsole.scrollTop = debugConsole.scrollHeight;
            console.log(message);
        }

        // ENHANCED API OBJECT
        const API = {
            baseURL: window.location.origin + "/janstro-inventory/public",
            tokenKey: "janstro_token",
            userKey: "janstro_user",

            getToken() { return localStorage.getItem(this.tokenKey); },
            setToken(token) { localStorage.setItem(this.tokenKey, token); },
            removeToken() {
                localStorage.removeItem(this.tokenKey);
                localStorage.removeItem(this.userKey);
            },
            getUser() {
                const userJson = localStorage.getItem(this.userKey);
                return userJson ? JSON.parse(userJson) : null;
            },
            setUser(user) { localStorage.setItem(this.userKey, JSON.stringify(user)); },
            isAuthenticated() { return !!this.getToken(); },

            async request(endpoint, options = {}) {
                const url = `${this.baseURL}${endpoint}`;
                debugLog(`📤 REQUEST: ${options.method || 'GET'} ${url}`, 'info');

                const config = {
                    headers: {
                        "Content-Type": "application/json",
                        ...options.headers,
                    },
                    ...options,
                };

                const token = this.getToken();
                if (token) {
                    config.headers["Authorization"] = `Bearer ${token}`;
                }

                try {
                    debugLog(`⏳ Sending request...`, 'info');
                    const response = await fetch(url, config);
                    
                    debugLog(`📥 Response Status: ${response.status} ${response.statusText}`, 
                        response.ok ? 'success' : 'error');

                    // Try to parse JSON
                    let data;
                    const contentType = response.headers.get('content-type');
                    
                    if (contentType && contentType.includes('application/json')) {
                        data = await response.json();
                        debugLog(`📊 Response Data: ${JSON.stringify(data).substring(0, 200)}...`, 'info');
                    } else {
                        const text = await response.text();
                        debugLog(`⚠️ Non-JSON Response: ${text.substring(0, 200)}...`, 'error');
                        throw new Error(`Server returned non-JSON response: ${text.substring(0, 100)}`);
                    }

                    if (response.status === 401) {
                        debugLog('🔒 Unauthorized - removing token', 'error');
                        this.removeToken();
                        throw new Error('Session expired. Please login again.');
                    }

                    if (!response.ok) {
                        debugLog(`❌ Request failed: ${data.message || 'Unknown error'}`, 'error');
                        throw new Error(data.message || 'API request failed.');
                    }

                    debugLog('✅ Request successful', 'success');
                    return data;
                } catch (error) {
                    debugLog(`💥 API Error: ${error.message}`, 'error');
                    throw error;
                }
            },

            async login(username, password) {
                debugLog(`🔐 Attempting login for: ${username}`, 'info');
                try {
                    const response = await this.request("/auth/login", {
                        method: "POST",
                        body: JSON.stringify({ username, password }),
                    });
                    
                    if (response.success && response.data) {
                        debugLog('✅ Login successful!', 'success');
                        this.setToken(response.data.token);
                        this.setUser(response.data.user);
                    }
                    return response;
                } catch (error) {
                    debugLog(`❌ Login failed: ${error.message}`, 'error');
                    throw error;
                }
            }
        };

        // Initialize
        debugLog('🚀 Page loaded', 'info');
        debugLog(`📍 API Base URL: ${API.baseURL}`, 'info');

        if (API.isAuthenticated()) {
            debugLog('✅ Already authenticated - redirecting...', 'success');
            window.location.href = 'dashboard.html';
        }

        // Toggle password visibility
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const icon = this.querySelector('i');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('bi-eye');
                icon.classList.add('bi-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('bi-eye-slash');
                icon.classList.add('bi-eye');
            }
        });

        // Handle login
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const alertContainer = document.getElementById('alertContainer');
            const loginBtn = document.getElementById('loginBtn');
            const loginBtnText = document.getElementById('loginBtnText');
            const loginSpinner = document.getElementById('loginSpinner');

            if (!username || !password) {
                showAlert('Please enter both username and password', 'danger');
                debugLog('❌ Validation failed: empty fields', 'error');
                return;
            }

            alertContainer.innerHTML = '';
            loginBtn.disabled = true;
            loginBtnText.classList.add('d-none');
            loginSpinner.classList.remove('d-none');

            try {
                const response = await API.login(username, password);
                
                if (response.success) {
                    showAlert('Login successful! Redirecting...', 'success');
                    debugLog('🔀 Redirecting to dashboard...', 'success');
                    
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1000);
                } else {
                    debugLog(`❌ Login response not successful: ${JSON.stringify(response)}`, 'error');
                    showAlert(response.message || 'Login failed. Please try again.', 'danger');
                    
                    loginBtn.disabled = false;
                    loginBtnText.classList.remove('d-none');
                    loginSpinner.classList.add('d-none');
                }
            } catch (error) {
                debugLog(`💥 Login exception: ${error.message}`, 'error');
                showAlert('Connection error: ' + error.message, 'danger');
                
                loginBtn.disabled = false;
                loginBtnText.classList.remove('d-none');
                loginSpinner.classList.add('d-none');
            }
        });

        function showAlert(message, type) {
            const alertContainer = document.getElementById('alertContainer');
            const alertHTML = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    <i class="bi ${type === 'success' ? 'bi-check-circle-fill' : 'bi-exclamation-triangle-fill'} me-2"></i>
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
            alertContainer.innerHTML = alertHTML;
        }

        // Test API health
        (async function testAPI() {
            try {
                const health = await fetch(API.baseURL + '/health');
                const data = await health.json();
                debugLog('✅ API Health Check: ' + JSON.stringify(data), 'success');
            } catch (error) {
                debugLog('❌ API Health Check Failed: ' + error.message, 'error');
                showAlert('Warning: Cannot connect to backend API. Please ensure XAMPP is running.', 'warning');
            }
        })();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Overview - Janstro IMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="assets/css/main-complete.css" rel="stylesheet">
</head>
<body>
    <button class="mobile-menu-toggle" aria-label="Toggle navigation menu">
        <i class="bi bi-list"></i>
    </button>

    <div id="sidebarContainer"></div>

    <main class="main-content" id="main-content">
        <header class="page-header">
            <h1>
                <i class="bi bi-box-seam" aria-hidden="true"></i>
                Stock Overview (MMBE)
            </h1>
            <p class="text-muted">Real-time inventory levels and stock status</p>
        </header>

        <!-- Action Bar -->
        <div class="d-flex justify-content-between align-items-center mb-4 gap-3 flex-wrap">
            <div class="d-flex gap-2 flex-wrap">
                <button id="btnAddItem" class="btn btn-primary" aria-label="Add new item">
                    <i class="bi bi-plus-circle" aria-hidden="true"></i>
                    Add Item
                </button>
                <button id="btnRefresh" class="btn btn-secondary" aria-label="Refresh inventory">
                    <i class="bi bi-arrow-clockwise" aria-hidden="true"></i>
                    Refresh
                </button>
            </div>
            <input 
                type="search" 
                id="searchInput" 
                class="form-control" 
                placeholder="Search items..."
                aria-label="Search inventory items"
                style="max-width: 300px;">
        </div>

        <!-- Inventory Table -->
        <section class="card">
            <div class="card-header">
                <h2 class="h5 mb-0">
                    <i class="bi bi-table" aria-hidden="true"></i>
                    Inventory Items
                </h2>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover" aria-label="Inventory items table">
                        <thead>
                            <tr>
                                <th scope="col">SKU</th>
                                <th scope="col">Item Name</th>
                                <th scope="col">Category</th>
                                <th scope="col">Quantity</th>
                                <th scope="col">Unit</th>
                                <th scope="col">Reorder Level</th>
                                <th scope="col">Unit Price</th>
                                <th scope="col">Status</th>
                                <th scope="col">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="inventoryTableBody">
                            <tr>
                                <td colspan="9" class="text-center py-5">
                                    <div class="spinner-border text-primary" role="status">
                                        <span class="visually-hidden">Loading inventory...</span>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <!-- Add/Edit Item Modal -->
    <div class="modal fade" id="itemModal" tabindex="-1" aria-labelledby="itemModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 class="modal-title h5" id="itemModalLabel">Add Item</h3>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="itemForm">
                    <div class="modal-body">
                        <input type="hidden" id="itemId">
                        
                        <div class="mb-3">
                            <label for="itemName" class="form-label">Item Name <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="itemName" required>
                        </div>

                        <div class="mb-3">
                            <label for="sku" class="form-label">SKU <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="sku" required>
                        </div>

                        <div class="mb-3">
                            <label for="categoryId" class="form-label">Category <span class="text-danger">*</span></label>
                            <select class="form-select" id="categoryId" required>
                                <option value="">Loading categories...</option>
                            </select>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="quantity" class="form-label">Quantity <span class="text-danger">*</span></label>
                                <input type="number" class="form-control" id="quantity" min="0" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="unit" class="form-label">Unit <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="unit" value="pcs" required>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="reorderLevel" class="form-label">Reorder Level <span class="text-danger">*</span></label>
                                <input type="number" class="form-control" id="reorderLevel" min="1" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="unitPrice" class="form-label">Unit Price (₱) <span class="text-danger">*</span></label>
                                <input type="number" class="form-control" id="unitPrice" step="0.01" min="0" required>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary" id="btnSaveItem">Save Item</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div class="modal fade" id="deleteModal" tabindex="-1" aria-labelledby="deleteModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h3 class="modal-title h5" id="deleteModalLabel">Confirm Deletion</h3>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>Are you sure you want to delete this item?</p>
                    <p><strong id="deleteItemName"></strong></p>
                    <p class="text-muted small">This action cannot be undone.</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-danger" id="btnConfirmDelete">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/error-handler.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/api-client.js"></script>
    <script src="assets/js/rbac.js"></script>
    <script src="assets/js/accessibility-fix.js"></script>
    <script src="assets/js/app-core.js"></script>
    <script>
        // Inventory Page Logic
        (async function() {
            let currentItems = [];
            let categories = [];
            let itemToDelete = null;

            const tbody = document.getElementById('inventoryTableBody');
            const searchInput = document.getElementById('searchInput');
            const itemModal = new bootstrap.Modal(document.getElementById('itemModal'));
            const deleteModal = new bootstrap.Modal(document.getElementById('deleteModal'));
            const itemForm = document.getElementById('itemForm');

            // Load data
            async function loadInventory() {
                try {
                    tbody.innerHTML = '<tr><td colspan="9" class="text-center py-4"><div class="spinner-border text-primary"></div></td></tr>';
                    
                    const response = await API.getInventory();
                    
                    if (response.success && Array.isArray(response.data)) {
                        currentItems = response.data;
                        renderTable(currentItems);
                    } else {
                        throw new Error('Invalid response format');
                    }
                } catch (error) {
                    console.error('Load inventory error:', error);
                    tbody.innerHTML = '<tr><td colspan="9" class="text-center py-4 text-danger">Failed to load inventory</td></tr>';
                }
            }

            async function loadCategories() {
                try {
                    const response = await API.getCategories();
                    if (response.success && Array.isArray(response.data)) {
                        categories = response.data;
                        populateCategorySelect();
                    }
                } catch (error) {
                    console.error('Load categories error:', error);
                }
            }

            function populateCategorySelect() {
                const select = document.getElementById('categoryId');
                select.innerHTML = '<option value="">Select category</option>';
                categories.forEach(cat => {
                    select.innerHTML += `<option value="${cat.category_id}">${cat.name}</option>`;
                });
            }

            function renderTable(items) {
                if (!items || items.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="9" class="text-center py-4 text-muted">No items found</td></tr>';
                    return;
                }

                tbody.innerHTML = items.map(item => {
                    const isLowStock = item.quantity <= item.reorder_level;
                    const stockStatus = isLowStock ? 
                        '<span class="badge bg-warning">Low Stock</span>' : 
                        '<span class="badge bg-success">In Stock</span>';

                    const canEdit = RBAC.can('inventory', 'edit');
                    const canDelete = RBAC.can('inventory', 'delete');

                    return `
                        <tr>
                            <td>${item.sku || 'N/A'}</td>
                            <td><strong>${item.item_name}</strong></td>
                            <td>${getCategoryName(item.category_id)}</td>
                            <td class="${isLowStock ? 'text-warning fw-bold' : ''}">${item.quantity}</td>
                            <td>${item.unit}</td>
                            <td>${item.reorder_level}</td>
                            <td>₱${parseFloat(item.unit_price).toFixed(2)}</td>
                            <td>${stockStatus}</td>
                            <td>
                                <div class="d-flex gap-2">
                                    ${canEdit ? `<button class="btn btn-sm btn-primary" onclick="editItem(${item.item_id})" aria-label="Edit ${item.item_name}">
                                        <i class="bi bi-pencil" aria-hidden="true"></i>
                                    </button>` : ''}
                                    ${canDelete ? `<button class="btn btn-sm btn-danger" onclick="deleteItem(${item.item_id}, '${item.item_name}')" aria-label="Delete ${item.item_name}">
                                        <i class="bi bi-trash" aria-hidden="true"></i>
                                    </button>` : ''}
                                </div>
                            </td>
                        </tr>
                    `;
                }).join('');
            }

            function getCategoryName(categoryId) {
                const cat = categories.find(c => c.category_id == categoryId);
                return cat ? cat.name : 'Unknown';
            }

            // Search
            searchInput.addEventListener('input', Utils.debounce((e) => {
                const query = e.target.value.toLowerCase();
                const filtered = currentItems.filter(item => 
                    item.item_name.toLowerCase().includes(query) ||
                    (item.sku && item.sku.toLowerCase().includes(query))
                );
                renderTable(filtered);
            }, 300));

            // Add item
            document.getElementById('btnAddItem').addEventListener('click', () => {
                if (!RBAC.can('inventory', 'create')) {
                    Utils.showToast('You do not have permission to add items', 'error');
                    return;
                }
                document.getElementById('itemModalLabel').textContent = 'Add Item';
                itemForm.reset();
                document.getElementById('itemId').value = '';
                itemModal.show();
            });

            // Edit item
            window.editItem = async (itemId) => {
                try {
                    const response = await API.getItem(itemId);
                    if (response.success && response.data) {
                        const item = response.data;
                        document.getElementById('itemModalLabel').textContent = 'Edit Item';
                        document.getElementById('itemId').value = item.item_id;
                        document.getElementById('itemName').value = item.item_name;
                        document.getElementById('sku').value = item.sku;
                        document.getElementById('categoryId').value = item.category_id;
                        document.getElementById('quantity').value = item.quantity;
                        document.getElementById('unit').value = item.unit;
                        document.getElementById('reorderLevel').value = item.reorder_level;
                        document.getElementById('unitPrice').value = item.unit_price;
                        itemModal.show();
                    }
                } catch (error) {
                    Utils.showToast('Failed to load item details', 'error');
                }
            };

            // Save item
            itemForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const itemId = document.getElementById('itemId').value;
                const data = {
                    item_name: document.getElementById('itemName').value,
                    sku: document.getElementById('sku').value,
                    category_id: document.getElementById('categoryId').value,
                    quantity: parseInt(document.getElementById('quantity').value),
                    unit: document.getElementById('unit').value,
                    reorder_level: parseInt(document.getElementById('reorderLevel').value),
                    unit_price: parseFloat(document.getElementById('unitPrice').value)
                };

                try {
                    const response = itemId ? 
                        await API.updateItem(itemId, data) : 
                        await API.createItem(data);
                    
                    if (response.success) {
                        Utils.showToast(response.message || 'Item saved successfully', 'success');
                        itemModal.hide();
                        loadInventory();
                    } else {
                        Utils.showToast(response.message || 'Failed to save item', 'error');
                    }
                } catch (error) {
                    Utils.showToast('Error saving item', 'error');
                }
            });

            // Delete item
            window.deleteItem = (itemId, itemName) => {
                itemToDelete = itemId;
                document.getElementById('deleteItemName').textContent = itemName;
                deleteModal.show();
            };

            document.getElementById('btnConfirmDelete').addEventListener('click', async () => {
                try {
                    const response = await API.deleteItem(itemToDelete);
                    if (response.success) {
                        Utils.showToast(response.message || 'Item deleted', 'success');
                        deleteModal.hide();
                        loadInventory();
                    } else {
                        Utils.showToast(response.message || 'Failed to delete', 'error');
                    }
                } catch (error) {
                    Utils.showToast('Error deleting item', 'error');
                }
            });

            // Refresh
            document.getElementById('btnRefresh').addEventListener('click', loadInventory);

            // Initial load
            await loadCategories();
            await loadInventory();
        })();
    </script>
    <script src="assets/js/app-init.js"></script>
</body>
</html>

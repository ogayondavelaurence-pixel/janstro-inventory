<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory - Stock Overview (MMBE) - Janstro Solar IMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="assets/css/main.css" rel="stylesheet">
</head>
<body>
    <div id="sidebarContainer"></div>

    <div class="main-content">
        <div class="page-header">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h1>📦 Stock Overview (MMBE)</h1>
                    <p class="text-muted">Material Master Data & Current Inventory Levels</p>
                </div>
                <button class="btn btn-primary" onclick="showAddItemModal()" id="btnAddItem">
                    <i class="bi bi-plus-circle"></i> Add New Item
                </button>
            </div>
        </div>

        <!-- Filters -->
        <div class="card mb-4">
            <div class="card-body">
                <div class="row">
                    <div class="col-md-4">
                        <input type="text" id="searchBox" class="form-control" placeholder="🔍 Search items...">
                    </div>
                    <div class="col-md-3">
                        <select id="categoryFilter" class="form-control">
                            <option value="">All Categories</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <select id="stockFilter" class="form-control">
                            <option value="">All Stock Levels</option>
                            <option value="low">Low Stock Only</option>
                            <option value="out">Out of Stock</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button class="btn btn-primary w-100" onclick="loadInventory()">
                            <i class="bi bi-arrow-clockwise"></i> Refresh
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Inventory Table -->
        <div class="card">
            <div class="card-header">
                <h3>📋 Material Master List</h3>
            </div>
            <div id="inventoryTable"></div>
        </div>
    </div>

    <!-- Add Item Modal -->
    <div class="modal fade" id="addItemModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add New Item</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addItemForm">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="form-label">Item Name *</label>
                                    <input type="text" class="form-control" id="itemName" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="form-label">SKU</label>
                                    <input type="text" class="form-control" id="itemSKU">
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="form-label">Category *</label>
                                    <select class="form-control" id="itemCategory" required>
                                        <option value="">Select Category</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="form-label">Unit *</label>
                                    <select class="form-control" id="itemUnit" required>
                                        <option value="pcs">Pieces (pcs)</option>
                                        <option value="set">Set</option>
                                        <option value="meters">Meters</option>
                                        <option value="kg">Kilograms</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-4">
                                <div class="form-group">
                                    <label class="form-label">Initial Quantity *</label>
                                    <input type="number" class="form-control" id="itemQuantity" min="0" value="0" required>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="form-group">
                                    <label class="form-label">Unit Price (₱) *</label>
                                    <input type="number" class="form-control" id="itemPrice" step="0.01" min="0" required>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="form-group">
                                    <label class="form-label">Reorder Level *</label>
                                    <input type="number" class="form-control" id="itemReorder" min="0" value="10" required>
                                </div>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" id="itemDescription" rows="3"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="saveItem()">
                        <i class="bi bi-save"></i> Save Item
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/rbac.js"></script>
    <script src="assets/js/sidebar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        let currentUser = null;
        let inventoryData = [];

        async function initPage() {
            try {
                // ✅ Get current user from backend session
                const userResponse = await API.getCurrentUser();
                
                if (!userResponse || !userResponse.success) {
                    window.location.href = 'index.html';
                    return;
                }

                currentUser = userResponse.data;
                console.log('✅ User loaded:', currentUser.username);

                // Enforce RBAC for add button
                RBAC.enforceActions('inventory', {
                    'add': '#btnAddItem'
                });

                // Load categories and inventory
                await loadCategories();
                await loadInventory();
                setupEventListeners();

            } catch (error) {
                console.error('Page init error:', error);
                Utils.showToast('Failed to load page', 'error');
            }
        }

        async function loadCategories() {
            try {
                const response = await API.get('/inventory/categories');
                
                if (response && response.success) {
                    const categories = response.data;
                    
                    // Populate filter dropdown
                    let filterOptions = '<option value="">All Categories</option>';
                    categories.forEach(cat => {
                        filterOptions += `<option value="${cat.category_id}">${Utils.escapeHtml(cat.name)}</option>`;
                    });
                    document.getElementById('categoryFilter').innerHTML = filterOptions;
                    
                    // Populate add form dropdown
                    let formOptions = '<option value="">Select Category</option>';
                    categories.forEach(cat => {
                        formOptions += `<option value="${cat.category_id}">${Utils.escapeHtml(cat.name)}</option>`;
                    });
                    document.getElementById('itemCategory').innerHTML = formOptions;
                }
            } catch (error) {
                console.error('Load categories error:', error);
            }
        }

        async function loadInventory() {
            try {
                Utils.showLoading('inventoryTable');
                
                const response = await API.getInventory();
                
                if (response && response.success) {
                    inventoryData = response.data;
                    renderInventoryTable(inventoryData);
                } else {
                    Utils.showError('inventoryTable', 'Failed to load inventory');
                }
            } catch (error) {
                console.error('Load inventory error:', error);
                Utils.showError('inventoryTable', error.message);
            }
        }

        function renderInventoryTable(data) {
            if (data.length === 0) {
                document.getElementById('inventoryTable').innerHTML = 
                    '<p class="text-center py-5 text-muted">No items found</p>';
                return;
            }

            let html = `
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>Item Name</th>
                                <th>SKU</th>
                                <th>Category</th>
                                <th>Stock</th>
                                <th>Unit Price</th>
                                <th>Total Value</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            data.forEach(item => {
                const stockStatus = item.quantity <= item.reorder_level ? 'Low Stock' : 'In Stock';
                const statusBadge = item.quantity <= item.reorder_level ? 'bg-danger' : 'bg-success';
                const totalValue = item.quantity * item.unit_price;

                html += `
                    <tr>
                        <td><strong>${Utils.escapeHtml(item.item_name)}</strong></td>
                        <td>${Utils.escapeHtml(item.sku || '-')}</td>
                        <td>${Utils.escapeHtml(item.category_name || 'Uncategorized')}</td>
                        <td><strong>${item.quantity}</strong> ${item.unit}</td>
                        <td>${Utils.formatCurrency(item.unit_price)}</td>
                        <td>${Utils.formatCurrency(totalValue)}</td>
                        <td><span class="badge ${statusBadge}">${stockStatus}</span></td>
                        <td>
                            <button class="btn btn-sm btn-info" onclick="viewItem(${item.item_id})">
                                <i class="bi bi-eye"></i>
                            </button>
                            <button class="btn btn-sm btn-primary" onclick="editItem(${item.item_id})">
                                <i class="bi bi-pencil"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });

            html += `
                        </tbody>
                    </table>
                </div>
            `;

            document.getElementById('inventoryTable').innerHTML = html;
        }

        function setupEventListeners() {
            // Search box
            document.getElementById('searchBox').addEventListener('input', filterInventory);
            
            // Filter dropdowns
            document.getElementById('categoryFilter').addEventListener('change', filterInventory);
            document.getElementById('stockFilter').addEventListener('change', filterInventory);
        }

        function filterInventory() {
            const searchTerm = document.getElementById('searchBox').value.toLowerCase();
            const categoryFilter = document.getElementById('categoryFilter').value;
            const stockFilter = document.getElementById('stockFilter').value;

            let filtered = inventoryData.filter(item => {
                const matchesSearch = item.item_name.toLowerCase().includes(searchTerm) ||
                                    (item.sku && item.sku.toLowerCase().includes(searchTerm));
                
                const matchesCategory = !categoryFilter || item.category_id == categoryFilter;
                
                let matchesStock = true;
                if (stockFilter === 'low') {
                    matchesStock = item.quantity <= item.reorder_level;
                } else if (stockFilter === 'out') {
                    matchesStock = item.quantity === 0;
                }

                return matchesSearch && matchesCategory && matchesStock;
            });

            renderInventoryTable(filtered);
        }

        function showAddItemModal() {
            const modal = new bootstrap.Modal(document.getElementById('addItemModal'));
            document.getElementById('addItemForm').reset();
            modal.show();
        }

        async function saveItem() {
            const itemData = {
                item_name: document.getElementById('itemName').value,
                sku: document.getElementById('itemSKU').value || null,
                category_id: parseInt(document.getElementById('itemCategory').value),
                quantity: parseInt(document.getElementById('itemQuantity').value),
                unit: document.getElementById('itemUnit').value,
                unit_price: parseFloat(document.getElementById('itemPrice').value),
                reorder_level: parseInt(document.getElementById('itemReorder').value),
                description: document.getElementById('itemDescription').value || null
            };

            try {
                const response = await API.createItem(itemData);
                
                if (response && response.success) {
                    Utils.showToast('Item created successfully', 'success');
                    bootstrap.Modal.getInstance(document.getElementById('addItemModal')).hide();
                    await loadInventory();
                } else {
                    Utils.showToast('Failed to create item', 'error');
                }
            } catch (error) {
                console.error('Save item error:', error);
                Utils.showToast(error.message, 'error');
            }
        }

        async function viewItem(itemId) {
            try {
                const response = await API.getItem(itemId);
                
                if (response && response.success) {
                    const item = response.data;
                    alert(`Item Details:\n\nName: ${item.item_name}\nSKU: ${item.sku || 'N/A'}\nStock: ${item.quantity} ${item.unit}\nPrice: ${Utils.formatCurrency(item.unit_price)}`);
                }
            } catch (error) {
                console.error('View item error:', error);
            }
        }

        function editItem(itemId) {
            Utils.showToast('Edit functionality coming soon', 'info');
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', initPage);
    </script>
</body>
</html>

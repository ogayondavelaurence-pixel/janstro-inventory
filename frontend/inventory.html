<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Overview - Janstro IMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="assets/css/main-complete.css" rel="stylesheet">
    <style>
        .filter-badge {
            display: inline-block;
            padding: 8px 16px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            border-radius: 8px;
            font-size: 14px;
            margin-left: 10px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .low-stock-row {
            background-color: rgba(245, 158, 11, 0.1) !important;
            border-left: 3px solid #f59e0b;
        }

        .critical-stock-row {
            background-color: rgba(239, 68, 68, 0.1) !important;
            border-left: 3px solid #ef4444;
        }
    </style>
</head>
<body>
    <button class="mobile-menu-toggle" aria-label="Toggle menu">
        <i class="bi bi-list"></i>
    </button>

    <div id="sidebarContainer"></div>

    <main class="main-content" id="main-content">
        <header class="page-header">
            <h1>
                <i class="bi bi-box-seam"></i>
                Stock Overview (MMBE)
                <span id="filterBadge"></span>
            </h1>
            <p class="text-muted">Real-time inventory levels and stock status</p>
        </header>

        <!-- Action Bar -->
        <div class="d-flex justify-content-between align-items-center mb-4 gap-3 flex-wrap">
            <div class="d-flex gap-2 flex-wrap">
                <button id="btnAddItem" class="btn btn-primary">
                    <i class="bi bi-plus-circle"></i>
                    Add Item
                </button>
                <button id="btnRefresh" class="btn btn-secondary">
                    <i class="bi bi-arrow-clockwise"></i>
                    Refresh
                </button>
                <button id="btnShowAll" class="btn btn-outline-primary" style="display: none;">
                    <i class="bi bi-x-circle"></i>
                    Show All Items
                </button>
                <button id="btnFilterLowStock" class="btn btn-outline-warning">
                    <i class="bi bi-funnel"></i>
                    Low Stock Only
                </button>
            </div>
            <input type="search" id="searchInput" class="form-control" 
                   placeholder="Search items..." style="max-width: 300px;">
        </div>

        <!-- Inventory Table -->
        <section class="card">
            <div class="card-header">
                <h2 class="h5 mb-0">
                    <i class="bi bi-table"></i>
                    Inventory Items
                    <span id="itemCount" class="badge bg-primary ms-2">0</span>
                </h2>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>SKU</th>
                                <th>Item Name</th>
                                <th>Category</th>
                                <th>Quantity</th>
                                <th>Unit</th>
                                <th>Reorder Level</th>
                                <th>Unit Price</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="inventoryTableBody">
                            <tr>
                                <td colspan="9" class="text-center py-5">
                                    <div class="spinner-border text-primary"></div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <!-- Add/Edit Item Modal -->
    <div class="modal fade" id="itemModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="itemModalLabel">Add Item</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" ></button>
                </div>
                <form id="itemForm">
                    <div class="modal-body">
                        <input type="hidden" id="itemId">
                        
                        <div class="mb-3">
                            <label for="itemName" class="form-label">Item Name <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="itemName" required>
                        </div>

                        <div class="mb-3">
                            <label for="sku" class="form-label">SKU <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="sku" required>
                        </div>

                        <div class="mb-3">
                            <label for="categoryId" class="form-label">Category <span class="text-danger">*</span></label>
                            <select class="form-select" id="categoryId" required>
                                <option value="">Loading...</option>
                            </select>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="quantity" class="form-label">Quantity <span class="text-danger">*</span></label>
                                <input type="number" class="form-control" id="quantity" min="0" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="unit" class="form-label">Unit <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="unit" value="pcs" required>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="reorderLevel" class="form-label">Reorder Level <span class="text-danger">*</span></label>
                                <input type="number" class="form-control" id="reorderLevel" min="1" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="unitPrice" class="form-label">Unit Price (₱) <span class="text-danger">*</span></label>
                                <input type="number" class="form-control" id="unitPrice" step="0.01" min="0" required>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Item</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Delete Modal -->
    <div class="modal fade" id="deleteModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title">Confirm Deletion</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close" ></button>
                </div>
                <div class="modal-body">
                    <p>Are you sure you want to delete this item?</p>
                    <p><strong id="deleteItemName"></strong></p>
                    <p class="text-muted small">This action cannot be undone.</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-danger" id="btnConfirmDelete">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/error-handler.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/api-client.js"></script>
    <script src="assets/js/rbac.js"></script>
    <script src="assets/js/accessibility-fix.js"></script>
    <script src="assets/js/app-core.js"></script>
    <script>
        (async function() {
            let currentItems = [];
            let allItems = [];
            let categories = [];
            let itemToDelete = null;
            let activeFilter = null;

            const tbody = document.getElementById('inventoryTableBody');
            const searchInput = document.getElementById('searchInput');
            const itemModal = new bootstrap.Modal(document.getElementById('itemModal'));
            const deleteModal = new bootstrap.Modal(document.getElementById('deleteModal'));
            const itemForm = document.getElementById('itemForm');

            // ✅ Check for URL filter parameter
            const urlParams = new URLSearchParams(window.location.search);
            const statusFilterFromURL = urlParams.get('filter');

            async function loadInventory() {
    try {
        tbody.innerHTML = '<tr><td colspan="9" class="text-center py-4"><div class="spinner-border text-primary"></div></td></tr>';
        
        const response = await API.getInventory();
        
        // Handle multiple response formats
        let items = [];
        if (Array.isArray(response)) {
            items = response;
        } else if (response?.data && Array.isArray(response.data)) {
            items = response.data;
        } else if (response?.success && Array.isArray(response.data)) {
            items = response.data;
        }
        
        allItems = items;
        currentItems = [...allItems];
        
        if (activeFilter === 'lowstock') {
            applyLowStockFilter();
        } else {
            renderTable(currentItems);
        }
    } catch (error) {
        console.error('Load inventory error:', error);
        tbody.innerHTML = '<tr><td colspan="9" class="text-center py-4 text-danger">Failed to load inventory</td></tr>';
    }
}

            async function loadCategories() {
                try {
                    const response = await API.getCategories();
                    
                    let cats = [];
                    if (Array.isArray(response)) {
                        cats = response;
                    } else if (response && Array.isArray(response.data)) {
                        cats = response.data;
                    }
                    
                    categories = cats;
                    populateCategorySelect();
                } catch (error) {
                    console.error('❌ Load categories error:', error);
                }
            }

            function populateCategorySelect() {
                const select = document.getElementById('categoryId');
                select.innerHTML = '<option value="">Select category</option>';
                categories.forEach(cat => {
                    select.innerHTML += `<option value="${cat.category_id}">${cat.name}</option>`;
                });
            }

            function renderTable(items) {
                if (!items || items.length === 0) {
                    const message = activeFilter === 'lowstock' 
                        ? '✅ No low stock items found' 
                        : 'No items found';
                    tbody.innerHTML = `<tr><td colspan="9" class="text-center py-4 text-muted">${message}</td></tr>`;
                    document.getElementById('itemCount').textContent = '0';
                    return;
                }

                tbody.innerHTML = items.map(item => {
                    const isLowStock = item.quantity <= item.reorder_level;
                    const isCritical = item.quantity === 0;
                    
                    const stockStatus = isCritical
                        ? '<span class="badge bg-danger">Out of Stock</span>'
                        : isLowStock
                        ? '<span class="badge bg-warning">Low Stock</span>'
                        : '<span class="badge bg-success">In Stock</span>';

                    const rowClass = isCritical ? 'critical-stock-row' : isLowStock ? 'low-stock-row' : '';

                    const canEdit = RBAC.can('inventory', 'edit');
                    const canDelete = RBAC.can('inventory', 'delete');

                    return `
                        <tr class="${rowClass}">
                            <td>${item.sku || 'N/A'}</td>
                            <td><strong>${item.item_name}</strong></td>
                            <td>${getCategoryName(item.category_id)}</td>
                            <td class="${isLowStock ? 'text-warning fw-bold' : ''}">${item.quantity}</td>
                            <td>${item.unit}</td>
                            <td>${item.reorder_level}</td>
                            <td>₱${parseFloat(item.unit_price).toFixed(2)}</td>
                            <td>${stockStatus}</td>
                            <td>
                                <div class="d-flex gap-2">
                                    ${canEdit ? `<button class="btn btn-sm btn-primary" onclick="editItem(${item.item_id})">
                                        <i class="bi bi-pencil"></i>
                                    </button>` : ''}
                                    ${canDelete ? `<button class="btn btn-sm btn-danger" onclick="deleteItem(${item.item_id}, '${item.item_name}')">
                                        <i class="bi bi-trash"></i>
                                    </button>` : ''}
                                </div>
                            </td>
                        </tr>
                    `;
                }).join('');

                document.getElementById('itemCount').textContent = items.length;
            }

            function getCategoryName(categoryId) {
                const cat = categories.find(c => c.category_id == categoryId);
                return cat ? cat.name : 'Unknown';
            }

            function applyLowStockFilter() {
                activeFilter = 'lowstock';
                currentItems = allItems.filter(item => item.quantity <= item.reorder_level);
                renderTable(currentItems);
                console.log(`🔍 Filtered to ${currentItems.length} low stock items`);
            }

            function clearFilters() {
                activeFilter = null;
                currentItems = [...allItems];
                renderTable(currentItems);
                
                document.getElementById('filterBadge').innerHTML = '';
                document.getElementById('btnShowAll').style.display = 'none';
                document.getElementById('btnFilterLowStock').style.display = 'inline-block';
                
                const url = new URL(window.location);
                url.searchParams.delete('filter');
                window.history.replaceState({}, '', url);
            }

            // Search
            searchInput.addEventListener('input', Utils.debounce((e) => {
                const query = e.target.value.toLowerCase();
                const filtered = currentItems.filter(item => 
                    item.item_name.toLowerCase().includes(query) ||
                    (item.sku && item.sku.toLowerCase().includes(query))
                );
                renderTable(filtered);
            }, 300));

            // Filter buttons
            document.getElementById('btnFilterLowStock').addEventListener('click', () => {
                applyLowStockFilter();
                document.getElementById('filterBadge').innerHTML = 
                    '<span class="filter-badge"><i class="bi bi-funnel-fill"></i> Low Stock</span>';
                document.getElementById('btnShowAll').style.display = 'inline-block';
                document.getElementById('btnFilterLowStock').style.display = 'none';
                Utils.showToast('Showing low stock items only', 'info');
            });

            document.getElementById('btnShowAll').addEventListener('click', () => {
                clearFilters();
                Utils.showToast('Showing all items', 'success');
            });

            // Add item
            document.getElementById('btnAddItem').addEventListener('click', () => {
                if (!RBAC.can('inventory', 'create')) {
                    Utils.showToast('You do not have permission to add items', 'error');
                    return;
                }
                document.getElementById('itemModalLabel').textContent = 'Add Item';
                itemForm.reset();
                document.getElementById('itemId').value = '';
                itemModal.show();
            });

            // Edit item
            window.editItem = async (itemId) => {
                try {
                    const response = await API.getItem(itemId);
                    let item = null;
                    
                    if (response && response.data) {
                        item = response.data;
                    } else if (response && response.item_id) {
                        item = response;
                    }
                    
                    if (item) {
                        document.getElementById('itemModalLabel').textContent = 'Edit Item';
                        document.getElementById('itemId').value = item.item_id;
                        document.getElementById('itemName').value = item.item_name;
                        document.getElementById('sku').value = item.sku;
                        document.getElementById('categoryId').value = item.category_id;
                        document.getElementById('quantity').value = item.quantity;
                        document.getElementById('unit').value = item.unit;
                        document.getElementById('reorderLevel').value = item.reorder_level;
                        document.getElementById('unitPrice').value = item.unit_price;
                        itemModal.show();
                    }
                } catch (error) {
                    Utils.showToast('Failed to load item', 'error');
                }
            };

            // Save item
            itemForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const itemId = document.getElementById('itemId').value;
                const data = {
                    item_name: document.getElementById('itemName').value,
                    sku: document.getElementById('sku').value,
                    category_id: document.getElementById('categoryId').value,
                    quantity: parseInt(document.getElementById('quantity').value),
                    unit: document.getElementById('unit').value,
                    reorder_level: parseInt(document.getElementById('reorderLevel').value),
                    unit_price: parseFloat(document.getElementById('unitPrice').value)
                };

                try {
                    const response = itemId ? 
                        await API.updateItem(itemId, data) : 
                        await API.createItem(data);
                    
                    if (response.success || response.item_id) {
                        Utils.showToast(itemId ? 'Item updated' : 'Item created', 'success');
                        itemModal.hide();
                        loadInventory();
                    } else {
                        Utils.showToast(response.message || 'Failed to save', 'error');
                    }
                } catch (error) {
                    Utils.showToast('Error saving item', 'error');
                }
            });

            // Delete item
            window.deleteItem = (itemId, itemName) => {
                itemToDelete = itemId;
                document.getElementById('deleteItemName').textContent = itemName;
                deleteModal.show();
            };

            document.getElementById('btnConfirmDelete').addEventListener('click', async () => {
                try {
                    const response = await API.deleteItem(itemToDelete);
                    if (response.success) {
                        Utils.showToast('Item deleted', 'success');
                        deleteModal.hide();
                        loadInventory();
                    } else {
                        Utils.showToast(response.message || 'Failed to delete', 'error');
                    }
                } catch (error) {
                    Utils.showToast('Error deleting item', 'error');
                }
            });

            document.getElementById('btnRefresh').addEventListener('click', loadInventory);

            // Initialize
            await loadCategories();
            await loadInventory();
            
            // Apply URL filter if present
            if (statusFilterFromURL === 'lowstock') {
                document.getElementById('btnFilterLowStock').click();
            }

            console.log('✅ Inventory page loaded');
        })();
    </script>
    <script src="assets/js/app-init.js"></script>
</body>
</html>

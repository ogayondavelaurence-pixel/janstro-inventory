<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory - Stock Overview (MMBE) - Janstro Solar IMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="assets/css/main.css" rel="stylesheet">
</head>
<body>
    <button class="mobile-menu-toggle" aria-label="Toggle menu"><i class="bi bi-list"></i></button>
    <div id="sidebarContainer"></div>

    <div class="main-content">
        <div class="page-header">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                <div>
                    <h1>📦 Stock Overview (MMBE)</h1>
                    <p class="text-muted mb-0">Material Master Data & Current Inventory Levels</p>
                </div>
                <button class="btn btn-primary" onclick="showAddItemModal()" id="btnAddItem" aria-label="Add new inventory item">
                    <i class="bi bi-plus-circle"></i> Add New Item
                </button>
            </div>
        </div>

        <!-- Filters -->
        <div class="card mb-4">
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label for="searchBox" class="form-label visually-hidden">Search items</label>
                        <input type="text" id="searchBox" class="form-control" placeholder="🔍 Search items..." aria-label="Search inventory items">
                    </div>
                    <div class="col-md-3">
                        <label for="categoryFilter" class="form-label visually-hidden">Filter by category</label>
                        <select id="categoryFilter" class="form-control" aria-label="Filter by category" title="Category filter">
                            <option value="">All Categories</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label for="stockFilter" class="form-label visually-hidden">Filter by stock level</label>
                        <select id="stockFilter" class="form-control" aria-label="Filter by stock level" title="Stock level filter">
                            <option value="">All Stock Levels</option>
                            <option value="low">Low Stock Only</option>
                            <option value="out">Out of Stock</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button class="btn btn-primary w-100" onclick="loadInventory()" aria-label="Refresh inventory list">
                            <i class="bi bi-arrow-clockwise"></i> Refresh
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Inventory Table -->
        <div class="card">
            <div class="card-header">
                <h3 class="mb-0">📋 Material Master List</h3>
            </div>
            <div id="inventoryTable" role="region" aria-live="polite"></div>
        </div>
    </div>

    <!-- Add Item Modal -->
    <div class="modal fade" id="addItemModal" tabindex="-1" aria-labelledby="addItemModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="addItemModalLabel">Add New Item</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div id="addItemForm">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="itemName" class="form-label">Item Name <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="itemName" required placeholder="Enter item name">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="itemSKU" class="form-label">SKU</label>
                                    <input type="text" class="form-control" id="itemSKU" placeholder="e.g., SP-250W-MONO">
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="itemCategory" class="form-label">Category <span class="text-danger">*</span></label>
                                    <select class="form-control" id="itemCategory" required title="Select item category">
                                        <option value="">Select Category</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="itemUnit" class="form-label">Unit <span class="text-danger">*</span></label>
                                    <select class="form-control" id="itemUnit" required title="Select unit of measure">
                                        <option value="pcs">Pieces (pcs)</option>
                                        <option value="set">Set</option>
                                        <option value="meters">Meters</option>
                                        <option value="kg">Kilograms</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-4">
                                <div class="mb-3">
                                    <label for="itemQuantity" class="form-label">Initial Quantity <span class="text-danger">*</span></label>
                                    <input type="number" class="form-control" id="itemQuantity" min="0" value="0" required placeholder="0">
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="mb-3">
                                    <label for="itemPrice" class="form-label">Unit Price (₱) <span class="text-danger">*</span></label>
                                    <input type="number" class="form-control" id="itemPrice" step="0.01" min="0" required placeholder="0.00">
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="mb-3">
                                    <label for="itemReorder" class="form-label">Reorder Level <span class="text-danger">*</span></label>
                                    <input type="number" class="form-control" id="itemReorder" min="0" value="10" required placeholder="10">
                                </div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="itemDescription" class="form-label">Description</label>
                            <textarea class="form-control" id="itemDescription" rows="3" placeholder="Enter item description"></textarea>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="saveItem()">
                        <i class="bi bi-save"></i> Save Item
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/rbac.js"></script>
    <script src="assets/js/sidebar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        let currentUser = null;
        let inventoryData = [];

        async function initPage() {
            try {
                const userResponse = await API.getCurrentUser();
                if (!userResponse?.success) {
                    window.location.href = 'index.html';
                    return;
                }
                currentUser = userResponse.data;
                console.log('✅ User loaded:', currentUser.username);

                RBAC.enforceActions('inventory', { 'add': '#btnAddItem' });
                await loadCategories();
                await loadInventory();
                setupEventListeners();
            } catch (error) {
                console.error('Page init error:', error);
                Utils.showToast('Failed to load page', 'error');
            }
        }

        async function loadCategories() {
            try {
                const response = await API.get('/inventory/categories');
                if (response?.success) {
                    const categories = response.data;
                    let filterOpts = '<option value="">All Categories</option>';
                    let formOpts = '<option value="">Select Category</option>';
                    categories.forEach(cat => {
                        const escaped = Utils.escapeHtml(cat.name);
                        filterOpts += `<option value="${cat.category_id}">${escaped}</option>`;
                        formOpts += `<option value="${cat.category_id}">${escaped}</option>`;
                    });
                    document.getElementById('categoryFilter').innerHTML = filterOpts;
                    document.getElementById('itemCategory').innerHTML = formOpts;
                }
            } catch (e) { console.error('Load categories error:', e); }
        }

        async function loadInventory() {
            try {
                Utils.showLoading('inventoryTable');
                const response = await API.getInventory();
                if (response?.success) {
                    inventoryData = response.data;
                    renderInventoryTable(inventoryData);
                } else {
                    Utils.showError('inventoryTable', 'Failed to load inventory');
                }
            } catch (e) {
                console.error('Load inventory error:', e);
                Utils.showError('inventoryTable', e.message);
            }
        }

        function renderInventoryTable(data) {
            if (!data.length) {
                document.getElementById('inventoryTable').innerHTML = '<p class="text-center py-5 text-muted">No items found</p>';
                return;
            }

            let html = `<div class="table-responsive"><table class="table table-hover">
                <thead><tr><th>Item Name</th><th>SKU</th><th>Category</th><th>Stock</th><th>Unit Price</th><th>Total Value</th><th>Status</th><th>Actions</th></tr></thead><tbody>`;

            data.forEach(item => {
                const isLow = item.quantity <= item.reorder_level;
                const status = isLow ? 'Low Stock' : 'In Stock';
                const badge = isLow ? 'bg-danger' : 'bg-success';
                const total = item.quantity * item.unit_price;

                html += `<tr>
                    <td><strong>${Utils.escapeHtml(item.item_name)}</strong></td>
                    <td>${Utils.escapeHtml(item.sku || '-')}</td>
                    <td>${Utils.escapeHtml(item.category_name || 'Uncategorized')}</td>
                    <td><strong>${item.quantity}</strong> ${item.unit}</td>
                    <td>${Utils.formatCurrency(item.unit_price)}</td>
                    <td>${Utils.formatCurrency(total)}</td>
                    <td><span class="badge ${badge}">${status}</span></td>
                    <td>
                        <button class="btn btn-sm btn-info" onclick="viewItem(${item.item_id})" aria-label="View ${Utils.escapeHtml(item.item_name)}"><i class="bi bi-eye"></i></button>
                        <button class="btn btn-sm btn-primary" onclick="editItem(${item.item_id})" aria-label="Edit ${Utils.escapeHtml(item.item_name)}"><i class="bi bi-pencil"></i></button>
                    </td>
                </tr>`;
            });

            html += '</tbody></table></div>';
            document.getElementById('inventoryTable').innerHTML = html;
        }

        function setupEventListeners() {
            document.getElementById('searchBox').addEventListener('input', filterInventory);
            document.getElementById('categoryFilter').addEventListener('change', filterInventory);
            document.getElementById('stockFilter').addEventListener('change', filterInventory);
        }

        function filterInventory() {
            const search = document.getElementById('searchBox').value.toLowerCase();
            const cat = document.getElementById('categoryFilter').value;
            const stock = document.getElementById('stockFilter').value;

            const filtered = inventoryData.filter(item => {
                const matchSearch = item.item_name.toLowerCase().includes(search) || (item.sku?.toLowerCase().includes(search));
                const matchCat = !cat || item.category_id == cat;
                let matchStock = true;
                if (stock === 'low') matchStock = item.quantity <= item.reorder_level;
                else if (stock === 'out') matchStock = item.quantity === 0;
                return matchSearch && matchCat && matchStock;
            });
            renderInventoryTable(filtered);
        }

        function showAddItemModal() {
            document.getElementById('itemName').value = '';
            document.getElementById('itemSKU').value = '';
            document.getElementById('itemCategory').value = '';
            document.getElementById('itemUnit').value = 'pcs';
            document.getElementById('itemQuantity').value = '0';
            document.getElementById('itemPrice').value = '';
            document.getElementById('itemReorder').value = '10';
            document.getElementById('itemDescription').value = '';
            new bootstrap.Modal(document.getElementById('addItemModal')).show();
        }

        async function saveItem() {
            const data = {
                item_name: document.getElementById('itemName').value,
                sku: document.getElementById('itemSKU').value || null,
                category_id: parseInt(document.getElementById('itemCategory').value),
                quantity: parseInt(document.getElementById('itemQuantity').value),
                unit: document.getElementById('itemUnit').value,
                unit_price: parseFloat(document.getElementById('itemPrice').value),
                reorder_level: parseInt(document.getElementById('itemReorder').value),
                description: document.getElementById('itemDescription').value || null
            };

            if (!data.item_name || !data.category_id || isNaN(data.unit_price)) {
                Utils.showToast('Please fill required fields', 'error');
                return;
            }

            try {
                const response = await API.createItem(data);
                if (response?.success) {
                    Utils.showToast('Item created successfully', 'success');
                    bootstrap.Modal.getInstance(document.getElementById('addItemModal')).hide();
                    await loadInventory();
                } else {
                    Utils.showToast('Failed to create item', 'error');
                }
            } catch (e) {
                console.error('Save item error:', e);
                Utils.showToast(e.message, 'error');
            }
        }

        async function viewItem(itemId) {
            try {
                const response = await API.getItem(itemId);
                if (response?.success) {
                    const item = response.data;
                    alert(`Item Details:\n\nName: ${item.item_name}\nSKU: ${item.sku || 'N/A'}\nStock: ${item.quantity} ${item.unit}\nPrice: ${Utils.formatCurrency(item.unit_price)}`);
                }
            } catch (e) { console.error('View item error:', e); }
        }

        function editItem(itemId) {
            Utils.showToast('Edit functionality coming soon', 'info');
        }

        document.addEventListener('DOMContentLoaded', initPage);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - Janstro Solar IMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="assets/css/main.css" rel="stylesheet">
</head>
<body>
    <button class="mobile-menu-toggle" aria-label="Toggle menu"><i class="bi bi-list"></i></button>
    <div id="sidebarContainer"></div>

    <div class="main-content">
        <div class="page-header">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                <div>
                    <h1>👥 User Management</h1>
                    <p class="text-muted mb-0">Manage system users and roles</p>
                </div>
                <button class="btn btn-primary" onclick="showAddUserModal()" id="btnAddUser">
                    <i class="bi bi-plus-circle"></i> Add User
                </button>
            </div>
        </div>

        <!-- Stats -->
        <div class="row mb-4">
            <div class="col-md-3"><div class="card text-center p-3"><h3 id="statTotal" class="text-primary mb-1">0</h3><small>Total Users</small></div></div>
            <div class="col-md-3"><div class="card text-center p-3"><h3 id="statActive" class="text-success mb-1">0</h3><small>Active</small></div></div>
            <div class="col-md-3"><div class="card text-center p-3"><h3 id="statAdmin" class="text-info mb-1">0</h3><small>Admins</small></div></div>
            <div class="col-md-3"><div class="card text-center p-3"><h3 id="statStaff" class="text-warning mb-1">0</h3><small>Staff</small></div></div>
        </div>

        <!-- Search -->
        <div class="card mb-4">
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-6">
                        <input type="text" id="searchUser" class="form-control" placeholder="🔍 Search users..." aria-label="Search users">
                    </div>
                    <div class="col-md-4">
                        <select id="roleFilter" class="form-control" aria-label="Filter by role">
                            <option value="">All Roles</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                      <button class="btn btn-primary w-100" onclick="loadUsers()" title="Reload users">
    <i class="bi bi-arrow-clockwise"></i>
</button>

                    </div>
                </div>
            </div>
        </div>

        <!-- Table -->
        <div class="card">
            <div class="card-header"><h3 class="mb-0">📋 User List</h3></div>
            <div id="userTable" role="region" aria-live="polite"></div>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal fade" id="userModal" tabindex="-1" aria-labelledby="userModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="userModalLabel">Add User</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="userId">
                    <div class="mb-3">
                        <label for="userName" class="form-label">Full Name <span class="text-danger">*</span></label>
                        <input type="text" id="userName" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="userUsername" class="form-label">Username <span class="text-danger">*</span></label>
                        <input type="text" id="userUsername" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="userEmail" class="form-label">Email</label>
                        <input type="email" id="userEmail" class="form-control">
                    </div>
                    <div class="mb-3" id="passwordGroup">
                        <label for="userPassword" class="form-label">Password <span class="text-danger">*</span></label>
                        <input type="password" id="userPassword" class="form-control" minlength="8">
                        <small class="text-muted">Min 8 characters</small>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="userRole" class="form-label">Role <span class="text-danger">*</span></label>
                            <select id="userRole" class="form-control" required></select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="userStatus" class="form-label">Status</label>
                            <select id="userStatus" class="form-control">
                                <option value="active">Active</option>
                                <option value="inactive">Inactive</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="userContact" class="form-label">Contact No.</label>
                        <input type="tel" id="userContact" class="form-control" placeholder="09XX XXX XXXX">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="saveUser()"><i class="bi bi-save"></i> Save</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="assets/js/api.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/rbac.js"></script>
    <script src="assets/js/sidebar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let userData = [], roles = [];

        async function initPage() {
            const res = await API.getCurrentUser();
            if (!res?.success) { window.location.href = 'index.html'; return; }
            await loadRoles();
            await loadUsers();
            document.getElementById('searchUser').addEventListener('input', filterUsers);
            document.getElementById('roleFilter').addEventListener('change', filterUsers);
        }

        async function loadRoles() {
            const res = await API.getRoles();
            if (res?.success) {
                roles = res.data;
                let opts = '<option value="">Select Role</option>';
                let filter = '<option value="">All Roles</option>';
                roles.forEach(r => {
                    opts += `<option value="${r.role_id}">${Utils.escapeHtml(r.role_name)}</option>`;
                    filter += `<option value="${r.role_id}">${Utils.escapeHtml(r.role_name)}</option>`;
                });
                document.getElementById('userRole').innerHTML = opts;
                document.getElementById('roleFilter').innerHTML = filter;
            }
        }

        async function loadUsers() {
            Utils.showLoading('userTable');
            const res = await API.getUsers();
            if (res?.success) { userData = res.data; renderTable(userData); updateStats(userData); }
            else Utils.showError('userTable', 'Failed to load');
        }

        function renderTable(data) {
            if (!data.length) { document.getElementById('userTable').innerHTML = '<p class="text-center py-5 text-muted">No users found</p>'; return; }
            let html = `<div class="table-responsive"><table class="table table-hover">
                <thead><tr><th>Name</th><th>Username</th><th>Email</th><th>Role</th><th>Status</th><th>Actions</th></tr></thead><tbody>`;
            data.forEach(u => {
                const roleBadge = u.role_name === 'superadmin' ? 'bg-danger' : u.role_name === 'admin' ? 'bg-primary' : 'bg-secondary';
                const statusBadge = u.status === 'active' ? 'bg-success' : 'bg-warning text-dark';
                html += `<tr>
                    <td><strong>${Utils.escapeHtml(u.name || u.username)}</strong></td>
                    <td>${Utils.escapeHtml(u.username)}</td>
                    <td>${Utils.escapeHtml(u.email || '-')}</td>
                    <td><span class="badge ${roleBadge}">${u.role_name}</span></td>
                    <td><span class="badge ${statusBadge}">${u.status}</span></td>
                    <td>
                        <button class="btn btn-sm btn-primary" onclick="editUser(${u.user_id})" title="Edit"><i class="bi bi-pencil"></i></button>
                        <button class="btn btn-sm btn-danger" onclick="deleteUser(${u.user_id})" title="Delete"><i class="bi bi-trash"></i></button>
                    </td>
                </tr>`;
            });
            html += '</tbody></table></div>';
            document.getElementById('userTable').innerHTML = html;
        }

        function updateStats(data) {
            document.getElementById('statTotal').textContent = data.length;
            document.getElementById('statActive').textContent = data.filter(u => u.status === 'active').length;
            document.getElementById('statAdmin').textContent = data.filter(u => ['admin','superadmin'].includes(u.role_name)).length;
            document.getElementById('statStaff').textContent = data.filter(u => u.role_name === 'staff').length;
        }

        function filterUsers() {
            const search = document.getElementById('searchUser').value.toLowerCase();
            const role = document.getElementById('roleFilter').value;
            const filtered = userData.filter(u => {
                const matchSearch = u.username.toLowerCase().includes(search) || u.name?.toLowerCase().includes(search);
                return (!role || u.role_id == role) && matchSearch;
            });
            renderTable(filtered);
        }

        function showAddUserModal() {
            document.getElementById('userModalLabel').textContent = 'Add User';
            document.getElementById('userId').value = '';
            ['userName','userUsername','userEmail','userPassword','userContact'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('userRole').value = '';
            document.getElementById('userStatus').value = 'active';
            document.getElementById('passwordGroup').style.display = 'block';
            document.getElementById('userPassword').required = true;
            new bootstrap.Modal(document.getElementById('userModal')).show();
        }

        function editUser(id) {
            const u = userData.find(user => user.user_id === id);
            if (!u) return;
            document.getElementById('userModalLabel').textContent = 'Edit User';
            document.getElementById('userId').value = u.user_id;
            document.getElementById('userName').value = u.name || '';
            document.getElementById('userUsername').value = u.username;
            document.getElementById('userEmail').value = u.email || '';
            document.getElementById('userPassword').value = '';
            document.getElementById('userRole').value = u.role_id;
            document.getElementById('userStatus').value = u.status || 'active';
            document.getElementById('userContact').value = u.contact_no || '';
            document.getElementById('passwordGroup').style.display = 'block';
            document.getElementById('userPassword').required = false;
            new bootstrap.Modal(document.getElementById('userModal')).show();
        }

        async function saveUser() {
            const id = document.getElementById('userId').value;
            const data = {
                name: document.getElementById('userName').value.trim(),
                username: document.getElementById('userUsername').value.trim(),
                email: document.getElementById('userEmail').value.trim(),
                role_id: parseInt(document.getElementById('userRole').value),
                status: document.getElementById('userStatus').value,
                contact_no: document.getElementById('userContact').value.trim()
            };
            const password = document.getElementById('userPassword').value;
            if (password) data.password = password;

            if (!data.name || !data.username || !data.role_id) { Utils.showToast('Fill required fields', 'error'); return; }
            if (!id && !password) { Utils.showToast('Password required for new user', 'error'); return; }

            try {
                const res = id ? await API.updateUser(id, data) : await API.createUser(data);
                if (res?.success) {
                    Utils.showToast(id ? 'User updated' : 'User created', 'success');
                    bootstrap.Modal.getInstance(document.getElementById('userModal')).hide();
                    loadUsers();
                } else Utils.showToast(res?.message || 'Failed', 'error');
            } catch (e) { Utils.showToast(e.message, 'error'); }
        }

        async function deleteUser(id) {
            if (!confirm('Delete this user?')) return;
            try {
                const res = await API.deleteUser(id);
                if (res?.success) { Utils.showToast('User deleted', 'success'); loadUsers(); }
                else Utils.showToast(res?.message || 'Failed', 'error');
            } catch (e) { Utils.showToast(e.message, 'error'); }
        }

        document.addEventListener('DOMContentLoaded', initPage);
    </script>
</body>
</html>

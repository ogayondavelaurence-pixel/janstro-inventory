<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Inquiries - Janstro IMS</title>
    <link rel="stylesheet" href="assets/css/main.css">
    <style>
        .inquiry-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .stat-card h3 {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 0.5rem;
        }

        .stat-card .value {
            font-size: 2rem;
            font-weight: bold;
            color: #333;
        }

        .stat-card.new { border-left: 4px solid #3b82f6; }
        .stat-card.processing { border-left: 4px solid #f59e0b; }
        .stat-card.quoted { border-left: 4px solid #8b5cf6; }
        .stat-card.converted { border-left: 4px solid #10b981; }

        .inquiry-filters {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .inquiry-table {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .inquiry-table table {
            width: 100%;
            border-collapse: collapse;
        }

        .inquiry-table th {
            background: #f8f9fa;
            padding: 1rem;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #e0e0e0;
        }

        .inquiry-table td {
            padding: 1rem;
            border-bottom: 1px solid #f0f0f0;
        }

        .inquiry-table tr:hover {
            background: #f8f9fa;
        }

        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .status-badge.new {
            background: #dbeafe;
            color: #1e40af;
        }

        .status-badge.processing {
            background: #fef3c7;
            color: #92400e;
        }

        .status-badge.quoted {
            background: #ede9fe;
            color: #6b21a8;
        }

        .status-badge.converted {
            background: #d1fae5;
            color: #065f46;
        }

        .status-badge.cancelled {
            background: #fee2e2;
            color: #991b1b;
        }

        .stock-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .stock-badge.available {
            background: #d1fae5;
            color: #065f46;
        }

        .stock-badge.insufficient {
            background: #fee2e2;
            color: #991b1b;
        }

        .stock-badge.checking {
            background: #e5e7eb;
            color: #374151;
        }

        .action-buttons {
            display: flex;
            gap: 0.5rem;
        }

        .action-buttons button {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .btn-view {
            background: #3b82f6;
            color: white;
        }

        .btn-view:hover {
            background: #2563eb;
        }

        .btn-convert {
            background: #10b981;
            color: white;
        }

        .btn-convert:hover {
            background: #059669;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-header h2 {
            font-size: 1.5rem;
            color: #333;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #666;
        }

        .detail-group {
            margin-bottom: 1.5rem;
        }

        .detail-group label {
            display: block;
            font-weight: 600;
            color: #666;
            margin-bottom: 0.5rem;
        }

        .detail-group .value {
            color: #333;
            font-size: 1.05rem;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: #666;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #999;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 1rem;
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sidebar (reuse existing) -->
        <aside class="sidebar" id="sidebar"></aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="page-header">
                <h1>📧 Customer Inquiries</h1>
            </div>

            <!-- Statistics -->
            <div class="inquiry-stats" id="statsContainer">
                <div class="stat-card new">
                    <h3>New Inquiries</h3>
                    <div class="value" id="stat-new">0</div>
                </div>
                <div class="stat-card processing">
                    <h3>Processing</h3>
                    <div class="value" id="stat-processing">0</div>
                </div>
                <div class="stat-card quoted">
                    <h3>Quoted</h3>
                    <div class="value" id="stat-quoted">0</div>
                </div>
                <div class="stat-card converted">
                    <h3>Converted</h3>
                    <div class="value" id="stat-converted">0</div>
                </div>
            </div>

            <!-- Filters -->
            <div class="inquiry-filters">
                <select id="statusFilter" class="form-control">
                    <option value="">All Status</option>
                    <option value="new">New</option>
                    <option value="processing">Processing</option>
                    <option value="quoted">Quoted</option>
                    <option value="converted">Converted</option>
                    <option value="cancelled">Cancelled</option>
                </select>
                <button onclick="loadInquiries()" class="btn btn-primary">🔄 Refresh</button>
            </div>

            <!-- Inquiries Table -->
            <div class="inquiry-table">
                <div id="loadingState" class="loading">
                    <p>Loading inquiries...</p>
                </div>

                <div id="emptyState" class="empty-state" style="display: none;">
                    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" />
                    </svg>
                    <p>No inquiries found</p>
                </div>

                <table id="inquiriesTable" style="display: none;">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Customer</th>
                            <th>Phone</th>
                            <th>Item</th>
                            <th>Status</th>
                            <th>Stock</th>
                            <th>Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="inquiriesBody"></tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Inquiry Detail Modal -->
    <div class="modal" id="detailModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Inquiry Details</h2>
                <button class="close-modal" onclick="closeModal()">×</button>
            </div>
            <div id="inquiryDetails"></div>
        </div>
    </div>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/sidebar.js"></script>
    <script>
        let currentInquiry = null;

        // Load statistics
        async function loadStatistics() {
            try {
                const stats = await API.get('/inquiries/stats');
                document.getElementById('stat-new').textContent = stats.new_count || 0;
                document.getElementById('stat-processing').textContent = stats.processing_count || 0;
                document.getElementById('stat-quoted').textContent = stats.quoted_count || 0;
                document.getElementById('stat-converted').textContent = stats.converted_count || 0;
            } catch (error) {
                console.error('Failed to load statistics:', error);
            }
        }

        // Load inquiries
        async function loadInquiries() {
            const loadingState = document.getElementById('loadingState');
            const emptyState = document.getElementById('emptyState');
            const table = document.getElementById('inquiriesTable');
            const tbody = document.getElementById('inquiriesBody');

            loadingState.style.display = 'block';
            emptyState.style.display = 'none';
            table.style.display = 'none';

            try {
                const statusFilter = document.getElementById('statusFilter').value;
                const params = statusFilter ? `?status=${statusFilter}` : '';
                const data = await API.get(`/inquiries${params}`);

                if (data.inquiries && data.inquiries.length > 0) {
                    tbody.innerHTML = data.inquiries.map(inquiry => `
                        <tr>
                            <td>#${inquiry.inquiry_id}</td>
                            <td>
                                <strong>${inquiry.customer_name}</strong><br>
                                <small>${inquiry.email || 'No email'}</small>
                            </td>
                            <td>${inquiry.phone}</td>
                            <td>${inquiry.item_name}</td>
                            <td><span class="status-badge ${inquiry.status}">${inquiry.status.toUpperCase()}</span></td>
                            <td><span class="stock-badge ${inquiry.stock_availability}">${inquiry.stock_availability}</span></td>
                            <td>${new Date(inquiry.created_at).toLocaleDateString()}</td>
                            <td>
                                <div class="action-buttons">
                                    <button class="btn-view" onclick="viewInquiry(${inquiry.inquiry_id})">View</button>
                                    ${inquiry.status !== 'converted' && inquiry.status !== 'cancelled' ? 
                                        `<button class="btn-convert" onclick="convertInquiry(${inquiry.inquiry_id})">Convert</button>` : ''}
                                </div>
                            </td>
                        </tr>
                    `).join('');

                    loadingState.style.display = 'none';
                    table.style.display = 'table';
                } else {
                    loadingState.style.display = 'none';
                    emptyState.style.display = 'block';
                }
            } catch (error) {
                console.error('Failed to load inquiries:', error);
                loadingState.textContent = 'Error loading inquiries';
            }
        }

        // View inquiry details
        async function viewInquiry(id) {
            try {
                const inquiry = await API.get(`/inquiries/${id}`);
                currentInquiry = inquiry;

                const detailsHTML = `
                    <div class="detail-group">
                        <label>Customer Name</label>
                        <div class="value">${inquiry.customer_name}</div>
                    </div>
                    <div class="detail-group">
                        <label>Phone</label>
                        <div class="value">${inquiry.phone}</div>
                    </div>
                    <div class="detail-group">
                        <label>Email</label>
                        <div class="value">${inquiry.email || 'Not provided'}</div>
                    </div>
                    <div class="detail-group">
                        <label>Address</label>
                        <div class="value">${inquiry.address}</div>
                    </div>
                    <div class="detail-group">
                        <label>Item</label>
                        <div class="value">${inquiry.item_name} (Qty: ${inquiry.quantity})</div>
                    </div>
                    <div class="detail-group">
                        <label>Budget Range</label>
                        <div class="value">${inquiry.budget_range || 'Not specified'}</div>
                    </div>
                    <div class="detail-group">
                        <label>Installation Date</label>
                        <div class="value">${inquiry.installation_date || 'Not specified'}</div>
                    </div>
                    <div class="detail-group">
                        <label>Notes</label>
                        <div class="value">${inquiry.notes || 'No notes'}</div>
                    </div>
                    <div class="detail-group">
                        <label>Status</label>
                        <div class="value">
                            <span class="status-badge ${inquiry.status}">${inquiry.status.toUpperCase()}</span>
                            <select id="newStatus" style="margin-left: 1rem; padding: 0.5rem;">
                                <option value="">Change to...</option>
                                <option value="new">New</option>
                                <option value="processing">Processing</option>
                                <option value="quoted">Quoted</option>
                                <option value="converted">Converted</option>
                                <option value="cancelled">Cancelled</option>
                            </select>
                            <button onclick="updateStatus()" class="btn btn-primary">Update</button>
                        </div>
                    </div>
                    ${inquiry.notes && inquiry.notes.length > 0 ? `
                        <div class="detail-group">
                            <label>Staff Notes</label>
                            ${inquiry.notes.map(note => `
                                <div style="background: #f8f9fa; padding: 0.75rem; border-radius: 6px; margin-bottom: 0.5rem;">
                                    <strong>${note.username}</strong> - ${new Date(note.created_at).toLocaleString()}<br>
                                    ${note.note_text}
                                </div>
                            `).join('')}
                        </div>
                    ` : ''}
                `;

                document.getElementById('inquiryDetails').innerHTML = detailsHTML;
                document.getElementById('detailModal').classList.add('active');
            } catch (error) {
                alert('Error loading inquiry details');
            }
        }

        // Update inquiry status
        async function updateStatus() {
            const newStatus = document.getElementById('newStatus').value;
            if (!newStatus || !currentInquiry) return;

            try {
                await API.put(`/inquiries/${currentInquiry.inquiry_id}/status`, { status: newStatus });
                alert('Status updated successfully');
                closeModal();
                loadInquiries();
                loadStatistics();
            } catch (error) {
                alert('Error updating status');
            }
        }

        // Convert inquiry to sales order
        async function convertInquiry(id) {
            if (!confirm('Convert this inquiry to a sales order?')) return;

            try {
                await API.post(`/inquiries/${id}/convert`);
                alert('Inquiry converted to sales order successfully!');
                loadInquiries();
                loadStatistics();
            } catch (error) {
                alert('Error converting inquiry: ' + error.message);
            }
        }

        // Close modal
        function closeModal() {
            document.getElementById('detailModal').classList.remove('active');
            currentInquiry = null;
        }

        // Filter change
        document.getElementById('statusFilter').addEventListener('change', loadInquiries);

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadStatistics();
            loadInquiries();
        });
    </script>
</body>
</html>

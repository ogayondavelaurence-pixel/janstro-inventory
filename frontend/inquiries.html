<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Inquiries - Janstro IMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="assets/css/main-complete.css" rel="stylesheet">
</head>
<body>
    <button class="mobile-menu-toggle" aria-label="Toggle navigation menu">
        <i class="bi bi-list"></i>
    </button>

    <div id="sidebarContainer"></div>

    <main class="main-content" id="main-content">
        <header class="page-header">
            <h1>
                <i class="bi bi-envelope" aria-hidden="true"></i>
                Customer Inquiries
            </h1>
            <p class="text-muted">Manage customer inquiries and convert to sales orders</p>
        </header>

        <div class="d-flex justify-content-between align-items-center mb-4 gap-3 flex-wrap">
            <div class="d-flex gap-2 flex-wrap">
                <select id="filterStatus" class="form-select" style="width: auto;" aria-label="Filter by status">
                    <option value="">All Status</option>
                    <option value="new">New</option>
                    <option value="in_progress">In Progress</option>
                    <option value="contacted">Contacted</option>
                    <option value="converted">Converted</option>
                    <option value="closed">Closed</option>
                </select>
                <select id="filterPriority" class="form-select" style="width: auto;" aria-label="Filter by priority">
                    <option value="">All Priority</option>
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                </select>
            </div>
            <button id="btnRefresh" class="btn btn-secondary" aria-label="Refresh inquiries">
                <i class="bi bi-arrow-clockwise" aria-hidden="true"></i>
            </button>
        </div>

        <section class="card">
            <div class="card-header">
                <h2 class="h5 mb-0">
                    <i class="bi bi-list-ul" aria-hidden="true"></i>
                    Inquiry List
                </h2>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover" aria-label="Customer inquiries table">
                        <thead>
                            <tr>
                                <th scope="col">Ref #</th>
                                <th scope="col">Date</th>
                                <th scope="col">Customer</th>
                                <th scope="col">Contact</th>
                                <th scope="col">Type</th>
                                <th scope="col">Priority</th>
                                <th scope="col">Status</th>
                                <th scope="col">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="inquiriesBody">
                            <tr>
                                <td colspan="8" class="text-center py-5">
                                    <div class="spinner-border text-primary" role="status">
                                        <span class="visually-hidden">Loading inquiries...</span>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <!-- View/Update Modal -->
    <div class="modal fade" id="inquiryModal" tabindex="-1" aria-labelledby="inquiryModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 class="modal-title h5" id="inquiryModalLabel">Inquiry Details</h3>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div id="inquiryDetails"></div>
                    
                    <form id="updateForm" class="mt-4">
                        <h4 class="h6 mb-3">Update Inquiry</h4>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="updateStatus" class="form-label">Status</label>
                                <select class="form-select" id="updateStatus">
                                    <option value="new">New</option>
                                    <option value="in_progress">In Progress</option>
                                    <option value="contacted">Contacted</option>
                                    <option value="closed">Closed</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="updatePriority" class="form-label">Priority</label>
                                <select class="form-select" id="updatePriority">
                                    <option value="low">Low</option>
                                    <option value="medium">Medium</option>
                                    <option value="high">High</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="updateNotes" class="form-label">Notes</label>
                            <textarea class="form-control" id="updateNotes" rows="3"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Update</button>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-success" id="btnConvert">Convert to SO</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Convert to SO Modal -->
    <div class="modal fade" id="convertModal" tabindex="-1" aria-labelledby="convertModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-success text-white">
                    <h3 class="modal-title h5" id="convertModalLabel">Convert to Sales Order</h3>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="convertForm">
                    <div class="modal-body">
                        <div id="convertCustomerInfo" class="alert alert-info"></div>
                        
                        <div class="mb-3">
                            <label for="convertItem" class="form-label">Item <span class="text-danger">*</span></label>
                            <select class="form-select" id="convertItem" required>
                                <option value="">Select item</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="convertQty" class="form-label">Quantity <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" id="convertQty" min="1" required>
                        </div>

                        <div class="mb-3">
                            <label for="convertAddress" class="form-label">Installation Address <span class="text-danger">*</span></label>
                            <textarea class="form-control" id="convertAddress" rows="2" required></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-success">Create Sales Order</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/error-handler.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/api-client.js"></script>
    <script src="assets/js/rbac.js"></script>
    <script src="assets/js/accessibility-fix.js"></script>
    <script src="assets/js/app-core.js"></script>
    <script>
        (async function() {
            let inquiries = [];
            let selectedInquiry = null;
            let items = [];

            const tbody = document.getElementById('inquiriesBody');
            const inquiryModal = new bootstrap.Modal(document.getElementById('inquiryModal'));
            const convertModal = new bootstrap.Modal(document.getElementById('convertModal'));

            async function loadInquiries(filters = {}) {
                try {
                    tbody.innerHTML = '<tr><td colspan="8" class="text-center py-4"><div class="spinner-border text-primary"></div></td></tr>';
                    const response = await API.getInquiries(filters);
                    
                    if (response.success && Array.isArray(response.data)) {
                        inquiries = response.data;
                        renderTable(inquiries);
                    }
                } catch (error) {
                    console.error('Load inquiries error:', error);
                    tbody.innerHTML = '<tr><td colspan="8" class="text-center py-4 text-danger">Failed to load inquiries</td></tr>';
                }
            }

            async function loadItems() {
                try {
                    const response = await API.getInventory();
                    if (response.success && Array.isArray(response.data)) {
                        items = response.data.filter(i => i.status === 'active');
                        populateItemSelect();
                    }
                } catch (error) {
                    console.error('Load items error:', error);
                }
            }

            function populateItemSelect() {
                const select = document.getElementById('convertItem');
                select.innerHTML = '<option value="">Select item</option>';
                items.forEach(i => {
                    select.innerHTML += `<option value="${i.item_id}">${i.item_name} (Stock: ${i.quantity})</option>`;
                });
            }

            function renderTable(inqs) {
                if (!inqs || inqs.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="8" class="text-center py-4 text-muted">No inquiries found</td></tr>';
                    return;
                }

                const canView = RBAC.can('inquiries', 'view');
                const canConvert = RBAC.can('inquiries', 'convert');

                tbody.innerHTML = inqs.map(inq => {
                    const statusBadge = {
                        new: 'bg-primary',
                        in_progress: 'bg-warning',
                        contacted: 'bg-info',
                        converted: 'bg-success',
                        closed: 'bg-secondary'
                    }[inq.status] || 'bg-secondary';

                    const priorityBadge = {
                        low: 'bg-info',
                        medium: 'bg-warning',
                        high: 'bg-danger'
                    }[inq.priority] || 'bg-secondary';

                    return `
                        <tr>
                            <td><strong>INQ-${String(inq.inquiry_id).padStart(6, '0')}</strong></td>
                            <td>${Utils.formatDate(inq.created_at)}</td>
                            <td>${inq.customer_name}</td>
                            <td>
                                ${inq.phone}<br>
                                <small class="text-muted">${inq.email}</small>
                            </td>
                            <td><span class="badge bg-light text-dark">${inq.inquiry_type}</span></td>
                            <td><span class="badge ${priorityBadge}">${inq.priority.toUpperCase()}</span></td>
                            <td><span class="badge ${statusBadge}">${inq.status.toUpperCase()}</span></td>
                            <td>
                                ${canView ? `<button class="btn btn-sm btn-primary" onclick="viewInquiry(${inq.inquiry_id})" aria-label="View inquiry ${inq.inquiry_id}">
                                    <i class="bi bi-eye" aria-hidden="true"></i>
                                </button>` : ''}
                            </td>
                        </tr>
                    `;
                }).join('');
            }

            window.viewInquiry = (inquiryId) => {
                selectedInquiry = inquiries.find(i => i.inquiry_id === inquiryId);
                if (selectedInquiry) {
                    document.getElementById('inquiryDetails').innerHTML = `
                        <h4 class="h6">INQ-${String(inquiryId).padStart(6, '0')}</h4>
                        <div class="row">
                            <div class="col-md-6">
                                <p><strong>Customer:</strong> ${selectedInquiry.customer_name}</p>
                                <p><strong>Phone:</strong> ${selectedInquiry.phone}</p>
                                <p><strong>Email:</strong> ${selectedInquiry.email}</p>
                            </div>
                            <div class="col-md-6">
                                <p><strong>Type:</strong> ${selectedInquiry.inquiry_type}</p>
                                <p><strong>Priority:</strong> ${selectedInquiry.priority}</p>
                                <p><strong>Status:</strong> ${selectedInquiry.status}</p>
                            </div>
                        </div>
                        <div class="mt-3">
                            <strong>Message:</strong>
                            <p class="mt-2">${selectedInquiry.message}</p>
                        </div>
                    `;

                    document.getElementById('updateStatus').value = selectedInquiry.status;
                    document.getElementById('updatePriority').value = selectedInquiry.priority;
                    document.getElementById('updateNotes').value = selectedInquiry.notes || '';

                    const btnConvert = document.getElementById('btnConvert');
                    btnConvert.style.display = (selectedInquiry.status !== 'converted' && RBAC.can('inquiries', 'convert')) ? 'block' : 'none';

                    inquiryModal.show();
                }
            };

            document.getElementById('updateForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const data = {
                    status: document.getElementById('updateStatus').value,
                    priority: document.getElementById('updatePriority').value,
                    notes: document.getElementById('updateNotes').value
                };

                try {
                    const response = await API.updateInquiry(selectedInquiry.inquiry_id, data);
                    if (response.success) {
                        Utils.showToast('Inquiry updated', 'success');
                        loadInquiries();
                    }
                } catch (error) {
                    Utils.showToast('Failed to update inquiry', 'error');
                }
            });

            document.getElementById('btnConvert').addEventListener('click', () => {
                document.getElementById('convertCustomerInfo').innerHTML = `
                    <strong>${selectedInquiry.customer_name}</strong><br>
                    ${selectedInquiry.phone} | ${selectedInquiry.email}
                `;
                inquiryModal.hide();
                convertModal.show();
            });

            document.getElementById('convertForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const data = {
                    item_id: document.getElementById('convertItem').value,
                    quantity: parseInt(document.getElementById('convertQty').value),
                    delivery_address: document.getElementById('convertAddress').value
                };

                try {
                    const response = await API.convertInquiry(selectedInquiry.inquiry_id, data);
                    if (response.success) {
                        Utils.showToast(`Converted to SO-${String(response.sales_order_id).padStart(5, '0')}`, 'success');
                        convertModal.hide();
                        loadInquiries();
                    } else {
                        Utils.showToast(response.message || 'Conversion failed', 'error');
                    }
                } catch (error) {
                    Utils.showToast('Error converting inquiry', 'error');
                }
            });

            document.getElementById('filterStatus').addEventListener('change', (e) => {
                const filters = {};
                if (e.target.value) filters.status = e.target.value;
                loadInquiries(filters);
            });

            document.getElementById('filterPriority').addEventListener('change', (e) => {
                const filters = {};
                if (e.target.value) filters.priority = e.target.value;
                loadInquiries(filters);
            });

            document.getElementById('btnRefresh').addEventListener('click', () => loadInquiries());

            await loadItems();
            await loadInquiries();
        })();
    </script>
    <script src="assets/js/app-init.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customers - Janstro IMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="assets/css/main-complete.css" rel="stylesheet">
</head>
<body>
    <button class="mobile-menu-toggle" aria-label="Toggle navigation menu">
        <i class="bi bi-list"></i>
    </button>

    <div id="sidebarContainer"></div>

    <main class="main-content" id="main-content">
        <header class="page-header">
            <h1>
                <i class="bi bi-person-lines-fill" aria-hidden="true"></i>
                Customer Master Data
            </h1>
            <p class="text-muted">Manage customer information and history</p>
        </header>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <button id="btnAddCustomer" class="btn btn-primary">
                <i class="bi bi-plus-circle" aria-hidden="true"></i>
                Add Customer
            </button>
            <input type="search" id="searchInput" class="form-control" placeholder="Search customers..." aria-label="Search customers" style="max-width: 300px;">
        </div>

        <section class="card">
            <div class="card-header">
                <h2 class="h5 mb-0">
                    <i class="bi bi-people" aria-hidden="true"></i>
                    Customer List
                </h2>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover" aria-label="Customers table">
                        <thead>
                            <tr>
                                <th scope="col">Customer Name</th>
                                <th scope="col">Contact</th>
                                <th scope="col">Email</th>
                                <th scope="col">Type</th>
                                <th scope="col">Total Orders</th>
                                <th scope="col">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="customersBody">
                            <tr>
                                <td colspan="6" class="text-center py-5">
                                    <div class="spinner-border text-primary" role="status">
                                        <span class="visually-hidden">Loading customers...</span>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <!-- Add/Edit Modal -->
    <div class="modal fade" id="customerModal" tabindex="-1" aria-labelledby="customerModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 class="modal-title h5" id="customerModalLabel">Add Customer</h3>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="customerForm">
                    <div class="modal-body">
                        <input type="hidden" id="customerId">
                        
                        <div class="mb-3">
                            <label for="customerName" class="form-label">Customer Name <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="customerName" required>
                        </div>

                        <div class="mb-3">
                            <label for="phone" class="form-label">Phone <span class="text-danger">*</span></label>
                            <input type="tel" class="form-control" id="phone" placeholder="09XXXXXXXXX" required>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email">
                        </div>

                        <div class="mb-3">
                            <label for="address" class="form-label">Address</label>
                            <textarea class="form-control" id="address" rows="2"></textarea>
                        </div>

                        <div class="mb-3">
                            <label for="customerType" class="form-label">Type</label>
                            <select class="form-select" id="customerType">
                                <option value="individual">Individual</option>
                                <option value="company">Company</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="notes" class="form-label">Notes</label>
                            <textarea class="form-control" id="notes" rows="2"></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Customer</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/error-handler.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/api-client.js"></script>
    <script src="assets/js/rbac.js"></script>
    <script src="assets/js/accessibility-fix.js"></script>
    <script src="assets/js/app-core.js"></script>
    <script>
        (async function() {
            let customers = [];
            const tbody = document.getElementById('customersBody');
            const customerModal = new bootstrap.Modal(document.getElementById('customerModal'));
            const customerForm = document.getElementById('customerForm');

            async function loadCustomers() {
                try {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4"><div class="spinner-border text-primary"></div></td></tr>';
                    const response = await API.getCustomers();
                    
                    if (response.success && Array.isArray(response.data)) {
                        customers = response.data;
                        renderTable(customers);
                    }
                } catch (error) {
                    console.error('Load customers error:', error);
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4 text-danger">Failed to load customers</td></tr>';
                }
            }

            function renderTable(custs) {
                if (!custs || custs.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4 text-muted">No customers found</td></tr>';
                    return;
                }

                tbody.innerHTML = custs.map(c => `
                    <tr>
                        <td><strong>${c.customer_name}</strong></td>
                        <td>${c.phone || 'N/A'}</td>
                        <td>${c.email || 'N/A'}</td>
                        <td><span class="badge bg-light text-dark">${c.customer_type}</span></td>
                        <td>${c.total_inquiries || 0}</td>
                        <td>
                            <button class="btn btn-sm btn-primary" onclick="editCustomer(${c.customer_id})">
                                <i class="bi bi-pencil" aria-hidden="true"></i>
                            </button>
                        </td>
                    </tr>
                `).join('');
            }

            document.getElementById('btnAddCustomer').addEventListener('click', () => {
                document.getElementById('customerModalLabel').textContent = 'Add Customer';
                customerForm.reset();
                document.getElementById('customerId').value = '';
                customerModal.show();
            });

            window.editCustomer = async (customerId) => {
                try {
                    const response = await API.getCustomer(customerId);
                    if (response.success && response.data) {
                        const c = response.data;
                        document.getElementById('customerModalLabel').textContent = 'Edit Customer';
                        document.getElementById('customerId').value = c.customer_id;
                        document.getElementById('customerName').value = c.customer_name;
                        document.getElementById('phone').value = c.phone || '';
                        document.getElementById('email').value = c.email || '';
                        document.getElementById('address').value = c.address || '';
                        document.getElementById('customerType').value = c.customer_type;
                        document.getElementById('notes').value = c.notes || '';
                        customerModal.show();
                    }
                } catch (error) {
                    Utils.showToast('Failed to load customer', 'error');
                }
            };

            customerForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const customerId = document.getElementById('customerId').value;
                const data = {
                    customer_name: document.getElementById('customerName').value,
                    phone: document.getElementById('phone').value,
                    email: document.getElementById('email').value || null,
                    address: document.getElementById('address').value || null,
                    customer_type: document.getElementById('customerType').value,
                    notes: document.getElementById('notes').value || null
                };

                try {
                    const response = customerId ? 
                        await API.updateCustomer(customerId, data) : 
                        await API.createCustomer(data);
                    
                    if (response.success) {
                        Utils.showToast(response.message || 'Customer saved', 'success');
                        customerModal.hide();
                        loadCustomers();
                    } else {
                        Utils.showToast(response.message || 'Failed to save', 'error');
                    }
                } catch (error) {
                    Utils.showToast('Error saving customer', 'error');
                }
            });

            document.getElementById('searchInput').addEventListener('input', Utils.debounce((e) => {
                const query = e.target.value.toLowerCase();
                const filtered = customers.filter(c => 
                    c.customer_name.toLowerCase().includes(query) ||
                    (c.phone && c.phone.includes(query)) ||
                    (c.email && c.email.toLowerCase().includes(query))
                );
                renderTable(filtered);
            }, 300));

            await loadCustomers();
        })();
    </script>
    <script src="assets/js/app-init.js"></script>
</body>
</html>

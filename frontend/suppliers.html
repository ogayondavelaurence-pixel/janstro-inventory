<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suppliers - Janstro Solar IMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="assets/css/main.css" rel="stylesheet">
</head>
<body>
    <button class="mobile-menu-toggle" aria-label="Toggle menu"><i class="bi bi-list"></i></button>
    <div id="sidebarContainer"></div>
    <div class="main-content">
        <div class="page-header">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                <div><h1><i class="bi bi-truck text-info"></i> Supplier Master Data</h1><p class="text-muted mb-0">Manage vendor information for procurement</p></div>
                <button class="btn btn-primary" onclick="showAddModal()" id="btnAdd"><i class="bi bi-plus-circle"></i> Add Supplier</button>
            </div>
        </div>
        <div class="row mb-4 g-3">
            <div class="col-6 col-md-4"><div class="card text-center p-3"><h3 id="statTotal" class="text-primary mb-1">0</h3><small>Total Suppliers</small></div></div>
            <div class="col-6 col-md-4"><div class="card text-center p-3"><h3 id="statActive" class="text-success mb-1">0</h3><small>Active</small></div></div>
            <div class="col-12 col-md-4"><div class="card text-center p-3"><h3 id="statInactive" class="text-secondary mb-1">0</h3><small>Inactive</small></div></div>
        </div>
        <div class="card mb-4"><div class="card-body"><div class="row g-3">
            <div class="col-md-6"><input type="text" id="searchSupplier" class="form-control" placeholder="🔍 Search supplier name, contact..." aria-label="Search"></div>
            <div class="col-md-4"><select id="statusFilter" class="form-control" aria-label="Status filter"><option value="">All Status</option><option value="active">Active</option><option value="inactive">Inactive</option></select></div>
            <div class="col-md-2"><button class="btn btn-primary w-100" onclick="loadSuppliers()"><i class="bi bi-arrow-clockwise"></i></button></div>
        </div></div></div>
        <div class="card"><div class="card-header"><h3 class="mb-0">📋 Supplier List</h3></div><div id="supplierTable"></div></div>
    </div>
    <div class="modal fade" id="supplierModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header"><h5 class="modal-title" id="supplierModalTitle">Add Supplier</h5><button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button></div>
                <div class="modal-body">
                    <input type="hidden" id="supplierId">
                    <div class="row">
                        <div class="col-md-6 mb-3"><label for="supplierName" class="form-label">Supplier Name <span class="text-danger">*</span></label><input type="text" id="supplierName" class="form-control" required placeholder="e.g., SolarTech Philippines"></div>
                        <div class="col-md-6 mb-3"><label for="contactPerson" class="form-label">Contact Person</label><input type="text" id="contactPerson" class="form-control" placeholder="e.g., John Santos"></div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3"><label for="supplierPhone" class="form-label">Phone</label><input type="tel" id="supplierPhone" class="form-control" placeholder="e.g., 02-1234-5678"></div>
                        <div class="col-md-6 mb-3"><label for="supplierEmail" class="form-label">Email</label><input type="email" id="supplierEmail" class="form-control" placeholder="e.g., sales@supplier.com"></div>
                    </div>
                    <div class="mb-3"><label for="supplierAddress" class="form-label">Address</label><textarea id="supplierAddress" class="form-control" rows="2" placeholder="Complete business address"></textarea></div>
                    <div class="row">
                        <div class="col-md-6 mb-3"><label for="paymentTerms" class="form-label">Payment Terms</label><select id="paymentTerms" class="form-control"><option value="Cash on Delivery">Cash on Delivery</option><option value="Net 15">Net 15</option><option value="Net 30">Net 30</option><option value="Net 60">Net 60</option></select></div>
                        <div class="col-md-6 mb-3"><label for="supplierStatus" class="form-label">Status</label><select id="supplierStatus" class="form-control"><option value="active">Active</option><option value="inactive">Inactive</option></select></div>
                    </div>
                    <div class="mb-3"><label for="supplierNotes" class="form-label">Notes</label><textarea id="supplierNotes" class="form-control" rows="2" placeholder="Additional notes..."></textarea></div>
                </div>
                <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button type="button" class="btn btn-primary" onclick="saveSupplier()"><i class="bi bi-save"></i> Save</button></div>
            </div>
        </div>
    </div>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/rbac.js"></script>
    <script src="assets/js/sidebar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let supplierData = [];
        async function initPage() {
            const res = await API.getCurrentUser();
            if (!res?.success) { window.location.href = 'index.html'; return; }
            RBAC.enforceActions('suppliers', { 'create': '#btnAdd' });
            await loadSuppliers();
            document.getElementById('searchSupplier').addEventListener('input', filterSuppliers);
            document.getElementById('statusFilter').addEventListener('change', filterSuppliers);
        }
        async function loadSuppliers() {
            Utils.showLoading('supplierTable');
            try {
                const res = await API.getSuppliers();
                if (res?.success) { supplierData = res.data || []; renderTable(supplierData); updateStats(supplierData); }
                else { supplierData = []; renderTable([]); updateStats([]); }
            } catch (e) { Utils.showError('supplierTable', 'Failed to load suppliers'); }
        }
        function renderTable(data) {
            if (!data.length) { document.getElementById('supplierTable').innerHTML = '<p class="text-center py-5 text-muted">No suppliers found. Click "Add Supplier" to create one.</p>'; return; }
            let html = `<div class="table-responsive"><table class="table table-hover"><thead><tr><th>Supplier</th><th>Contact Person</th><th>Phone</th><th>Email</th><th>Terms</th><th>Status</th><th>Actions</th></tr></thead><tbody>`;
            data.forEach(s => {
                const badge = s.status === 'active' ? 'bg-success' : 'bg-secondary';
                html += `<tr>
                    <td><strong>${Utils.escapeHtml(s.supplier_name)}</strong><br><small class="text-muted">${Utils.escapeHtml(s.address || '').substring(0, 30)}${s.address?.length > 30 ? '...' : ''}</small></td>
                    <td>${Utils.escapeHtml(s.contact_person || '-')}</td>
                    <td>${Utils.escapeHtml(s.phone || '-')}</td>
                    <td>${Utils.escapeHtml(s.email || '-')}</td>
                    <td><span class="badge bg-info">${Utils.escapeHtml(s.payment_terms || 'COD')}</span></td>
                    <td><span class="badge ${badge}">${s.status}</span></td>
                    <td>
                        <button class="btn btn-sm btn-primary" onclick="editSupplier(${s.supplier_id})" title="Edit"><i class="bi bi-pencil"></i></button>
                        <button class="btn btn-sm btn-danger" onclick="deleteSupplier(${s.supplier_id})" title="Delete"><i class="bi bi-trash"></i></button>
                    </td>
                </tr>`;
            });
            html += '</tbody></table></div>';
            document.getElementById('supplierTable').innerHTML = html;
        }
        function updateStats(data) {
            document.getElementById('statTotal').textContent = data.length;
            document.getElementById('statActive').textContent = data.filter(s => s.status === 'active').length;
            document.getElementById('statInactive').textContent = data.filter(s => s.status === 'inactive').length;
        }
        function filterSuppliers() {
            const search = document.getElementById('searchSupplier').value.toLowerCase();
            const status = document.getElementById('statusFilter').value;
            renderTable(supplierData.filter(s => {
                const matchSearch = s.supplier_name?.toLowerCase().includes(search) || s.contact_person?.toLowerCase().includes(search) || s.email?.toLowerCase().includes(search);
                return (!status || s.status === status) && matchSearch;
            }));
        }
        function showAddModal() {
            document.getElementById('supplierModalTitle').textContent = 'Add Supplier';
            document.getElementById('supplierId').value = '';
            ['supplierName','contactPerson','supplierPhone','supplierEmail','supplierAddress','supplierNotes'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('paymentTerms').value = 'Cash on Delivery';
            document.getElementById('supplierStatus').value = 'active';
            new bootstrap.Modal(document.getElementById('supplierModal')).show();
        }
        function editSupplier(id) {
            const s = supplierData.find(sup => sup.supplier_id === id);
            if (!s) return;
            document.getElementById('supplierModalTitle').textContent = 'Edit Supplier';
            document.getElementById('supplierId').value = s.supplier_id;
            document.getElementById('supplierName').value = s.supplier_name || '';
            document.getElementById('contactPerson').value = s.contact_person || '';
            document.getElementById('supplierPhone').value = s.phone || '';
            document.getElementById('supplierEmail').value = s.email || '';
            document.getElementById('supplierAddress').value = s.address || '';
            document.getElementById('paymentTerms').value = s.payment_terms || 'Cash on Delivery';
            document.getElementById('supplierStatus').value = s.status || 'active';
            document.getElementById('supplierNotes').value = s.notes || '';
            new bootstrap.Modal(document.getElementById('supplierModal')).show();
        }
        async function saveSupplier() {
            const id = document.getElementById('supplierId').value;
            const data = {
                supplier_name: document.getElementById('supplierName').value.trim(),
                contact_person: document.getElementById('contactPerson').value.trim(),
                phone: document.getElementById('supplierPhone').value.trim(),
                email: document.getElementById('supplierEmail').value.trim(),
                address: document.getElementById('supplierAddress').value.trim(),
                payment_terms: document.getElementById('paymentTerms').value,
                status: document.getElementById('supplierStatus').value,
                notes: document.getElementById('supplierNotes').value.trim()
            };
            if (!data.supplier_name) { Utils.showToast('Supplier name is required', 'error'); return; }
            if (data.email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(data.email)) { Utils.showToast('Invalid email format', 'error'); return; }
            try {
                const res = id ? await API.updateSupplier(id, data) : await API.createSupplier(data);
                if (res?.success) {
                    Utils.showToast(id ? 'Supplier updated successfully' : 'Supplier created successfully', 'success');
                    bootstrap.Modal.getInstance(document.getElementById('supplierModal')).hide();
                    loadSuppliers();
                } else Utils.showToast(res?.message || 'Operation failed', 'error');
            } catch (e) { Utils.showToast(e.message, 'error'); }
        }
        async function deleteSupplier(id) {
            const s = supplierData.find(sup => sup.supplier_id === id);
            if (!confirm(`Delete supplier "${s?.supplier_name}"?\n\nThis cannot be undone.`)) return;
            try {
                const res = await API.deleteSupplier(id);
                if (res?.success) { Utils.showToast('Supplier deleted', 'success'); loadSuppliers(); }
                else Utils.showToast(res?.message || 'Cannot delete - may have linked POs', 'error');
            } catch (e) { Utils.showToast(e.message, 'error'); }
        }
        document.addEventListener('DOMContentLoaded', initPage);
    </script>
</body>
</html>

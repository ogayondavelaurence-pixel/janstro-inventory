<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Requirements - Janstro IMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="assets/css/main-complete.css" rel="stylesheet">
</head>
<body>
    <button class="mobile-menu-toggle" aria-label="Toggle navigation menu">
        <i class="bi bi-list"></i>
    </button>

    <div id="sidebarContainer"></div>

    <main class="main-content" id="main-content">
        <header class="page-header">
            <h1>
                <i class="bi bi-clipboard-data" aria-hidden="true"></i>
                Stock Requirements (MD04)
            </h1>
            <p class="text-muted">Material requirements planning and shortage analysis</p>
        </header>

        <div class="d-flex justify-content-end mb-4">
            <button id="btnRefresh" class="btn btn-secondary" aria-label="Refresh requirements">
                <i class="bi bi-arrow-clockwise" aria-hidden="true"></i>
                Refresh
            </button>
        </div>

        <section class="card">
            <div class="card-header">
                <h2 class="h5 mb-0">
                    <i class="bi bi-list-ul" aria-hidden="true"></i>
                    Requirements Analysis
                </h2>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover" aria-label="Stock requirements table">
                        <thead>
                            <tr>
                                <th scope="col">SO #</th>
                                <th scope="col">Customer</th>
                                <th scope="col">Item</th>
                                <th scope="col">Required</th>
                                <th scope="col">Available</th>
                                <th scope="col">Shortage</th>
                                <th scope="col">Status</th>
                                <th scope="col">Created</th>
                            </tr>
                        </thead>
                        <tbody id="requirementsBody">
                            <tr>
                                <td colspan="8" class="text-center py-5">
                                    <div class="spinner-border text-primary" role="status">
                                        <span class="visually-hidden">Loading requirements...</span>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/error-handler.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/api-client.js"></script>
    <script src="assets/js/rbac.js"></script>
    <script src="assets/js/accessibility-fix.js"></script>
    <script src="assets/js/app-core.js"></script>
    <script>
        (async function() {
            const tbody = document.getElementById('requirementsBody');

            async function loadRequirements() {
                try {
                    tbody.innerHTML = '<tr><td colspan="8" class="text-center py-4"><div class="spinner-border text-primary"></div></td></tr>';
                    const response = await API.getStockRequirements();
                    
                    if (response.success && Array.isArray(response.data)) {
                        renderTable(response.data);
                    } else {
                        throw new Error('Invalid response');
                    }
                } catch (error) {
                    console.error('Load requirements error:', error);
                    tbody.innerHTML = '<tr><td colspan="8" class="text-center py-4 text-danger">Failed to load requirements</td></tr>';
                }
            }

            function renderTable(requirements) {
                if (!requirements || requirements.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="8" class="text-center py-4 text-muted">No requirements found</td></tr>';
                    return;
                }

                tbody.innerHTML = requirements.map(r => {
                    const statusBadge = {
                        sufficient: 'bg-success',
                        shortage: 'bg-warning',
                        critical: 'bg-danger'
                    }[r.status] || 'bg-secondary';

                    const shortage = r.shortage_quantity || 0;

                    return `
                        <tr>
                            <td><strong>SO-${String(r.sales_order_id).padStart(5, '0')}</strong></td>
                            <td>${r.customer_name || 'N/A'}</td>
                            <td>${r.item_name || 'N/A'}</td>
                            <td><strong>${r.required_quantity}</strong></td>
                            <td>${r.available_quantity}</td>
                            <td class="${shortage > 0 ? 'text-danger fw-bold' : 'text-success'}">
                                ${shortage > 0 ? shortage : '0'}
                            </td>
                            <td><span class="badge ${statusBadge}">${r.status.toUpperCase()}</span></td>
                            <td>${Utils.formatDate(r.created_at)}</td>
                        </tr>
                    `;
                }).join('');
            }

            document.getElementById('btnRefresh').addEventListener('click', loadRequirements);

            await loadRequirements();
        })();
    </script>
    <script src="assets/js/app-init.js"></script>
</body>
</html>

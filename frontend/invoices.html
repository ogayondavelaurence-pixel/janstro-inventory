<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoices (VF01) - Janstro Solar IMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="assets/css/main.css" rel="stylesheet">
</head>
<body>
    <button class="mobile-menu-toggle" aria-label="Toggle menu"><i class="bi bi-list"></i></button>
    <div id="sidebarContainer"></div>
    <div class="main-content">
        <div class="page-header">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                <div>
                    <h1><i class="bi bi-receipt text-success"></i> Invoices (VF01)</h1>
                    <p class="text-muted mb-0">View and manage generated invoices</p>
                </div>
                <button class="btn btn-outline-primary" onclick="exportInvoices()"><i class="bi bi-download"></i> Export</button>
            </div>
        </div>
        <div class="row mb-4 g-3">
            <div class="col-6 col-md-3"><div class="card text-center p-3"><h3 id="statTotal" class="text-primary mb-1">0</h3><small>Total Invoices</small></div></div>
            <div class="col-6 col-md-3"><div class="card text-center p-3"><h3 id="statPaid" class="text-success mb-1">0</h3><small>Paid</small></div></div>
            <div class="col-6 col-md-3"><div class="card text-center p-3"><h3 id="statUnpaid" class="text-warning mb-1">0</h3><small>Unpaid</small></div></div>
            <div class="col-6 col-md-3"><div class="card text-center p-3"><h3 id="statRevenue" class="text-info mb-1">₱0</h3><small>Total Revenue</small></div></div>
        </div>
        <div class="card mb-4"><div class="card-body">
            <div class="row g-3">
                <div class="col-md-4"><input type="text" id="searchInv" class="form-control" placeholder="🔍 Search invoice#, customer..." aria-label="Search"></div>
                <div class="col-md-3"><select id="paidFilter" class="form-control" aria-label="Payment status"><option value="">All Status</option><option value="paid">Paid</option><option value="unpaid">Unpaid</option><option value="partial">Partial</option></select></div>
                <div class="col-md-3"><input type="month" id="monthFilter" class="form-control" aria-label="Month filter"></div>
                <div class="col-md-2"><button class="btn btn-primary w-100" onclick="loadInvoices()"><i class="bi bi-arrow-clockwise"></i></button></div>
            </div>
        </div></div>
        <div class="card"><div class="card-header"><h3 class="mb-0">📋 Invoice List</h3></div><div id="invoiceTable" role="region" aria-live="polite"></div></div>
    </div>
    <div class="modal fade" id="invoiceModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-success text-white"><h5 class="modal-title" id="invoiceModalTitle">Invoice Details</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button></div>
                <div class="modal-body" id="invoiceDetails"></div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" onclick="printInvoice()"><i class="bi bi-printer"></i> Print</button>
                </div>
            </div>
        </div>
    </div>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/rbac.js"></script>
    <script src="assets/js/sidebar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let invoiceData = [];
        async function initPage() {
            const res = await API.getCurrentUser();
            if (!res?.success) { window.location.href = 'index.html'; return; }
            await loadInvoices();
            setupListeners();
        }
        async function loadInvoices() {
            Utils.showLoading('invoiceTable');
            try {
                const res = await API.get('/invoices');
                if (res?.success) { invoiceData = res.data || []; renderTable(invoiceData); updateStats(invoiceData); }
                else { invoiceData = []; renderTable([]); updateStats([]); }
            } catch (e) { invoiceData = []; renderTable([]); updateStats([]); }
        }
        function renderTable(data) {
            if (!data.length) { document.getElementById('invoiceTable').innerHTML = '<p class="text-center py-5 text-muted">No invoices found. Generate invoices from Sales Orders.</p>'; return; }
            let html = `<div class="table-responsive"><table class="table table-hover"><thead><tr><th>Invoice #</th><th>Customer</th><th>SO#</th><th>Amount</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead><tbody>`;
            data.forEach(inv => {
                const badge = inv.paid_status === 'paid' ? 'bg-success' : inv.paid_status === 'partial' ? 'bg-info' : 'bg-warning text-dark';
                html += `<tr>
                    <td><strong>${Utils.escapeHtml(inv.invoice_number)}</strong></td>
                    <td>${Utils.escapeHtml(inv.customer_name)}</td>
                    <td>SO-${String(inv.sales_order_id).padStart(4,'0')}</td>
                    <td>${Utils.formatCurrency(inv.total_amount)}</td>
                    <td>${Utils.formatDate(inv.generated_at)}</td>
                    <td><span class="badge ${badge}">${inv.paid_status}</span></td>
                    <td>
                        <button class="btn btn-sm btn-info" onclick="viewInvoice(${inv.invoice_id})" title="View"><i class="bi bi-eye"></i></button>
                        ${inv.paid_status !== 'paid' ? `<button class="btn btn-sm btn-success" onclick="markPaid(${inv.invoice_id})" title="Mark Paid"><i class="bi bi-check"></i></button>` : ''}
                    </td>
                </tr>`;
            });
            html += '</tbody></table></div>';
            document.getElementById('invoiceTable').innerHTML = html;
        }
        function updateStats(data) {
            document.getElementById('statTotal').textContent = data.length;
            document.getElementById('statPaid').textContent = data.filter(i => i.paid_status === 'paid').length;
            document.getElementById('statUnpaid').textContent = data.filter(i => i.paid_status === 'unpaid').length;
            document.getElementById('statRevenue').textContent = Utils.formatCurrency(data.filter(i => i.paid_status === 'paid').reduce((sum, i) => sum + parseFloat(i.total_amount || 0), 0));
        }
        function setupListeners() {
            document.getElementById('searchInv').addEventListener('input', filterInvoices);
            document.getElementById('paidFilter').addEventListener('change', filterInvoices);
        }
        function filterInvoices() {
            const search = document.getElementById('searchInv').value.toLowerCase();
            const paid = document.getElementById('paidFilter').value;
            const filtered = invoiceData.filter(inv => {
                const matchSearch = inv.invoice_number?.toLowerCase().includes(search) || inv.customer_name?.toLowerCase().includes(search);
                return (!paid || inv.paid_status === paid) && matchSearch;
            });
            renderTable(filtered);
        }
        function viewInvoice(id) {
            const inv = invoiceData.find(i => i.invoice_id === id);
            if (!inv) return;
            document.getElementById('invoiceModalTitle').textContent = inv.invoice_number;
            document.getElementById('invoiceDetails').innerHTML = `
                <div class="text-center mb-4"><h4>JANSTRO PRIME</h4><p class="text-muted">Renewable Energy Solutions</p></div>
                <div class="row mb-3"><div class="col-6"><strong>Invoice:</strong> ${inv.invoice_number}</div><div class="col-6 text-end"><strong>Date:</strong> ${Utils.formatDate(inv.generated_at)}</div></div>
                <div class="row mb-3"><div class="col-6"><strong>Customer:</strong> ${Utils.escapeHtml(inv.customer_name)}</div><div class="col-6 text-end"><strong>SO#:</strong> SO-${String(inv.sales_order_id).padStart(4,'0')}</div></div>
                <hr><div class="row"><div class="col-12"><h5>Total Amount: ${Utils.formatCurrency(inv.total_amount)}</h5></div></div>
                <div class="mt-3"><span class="badge ${inv.paid_status === 'paid' ? 'bg-success' : 'bg-warning'} fs-6">${inv.paid_status.toUpperCase()}</span></div>`;
            new bootstrap.Modal(document.getElementById('invoiceModal')).show();
        }
        async function markPaid(id) {
            if (!confirm('Mark this invoice as paid?')) return;
            try {
                const res = await API.put(`/invoices/${id}`, { paid_status: 'paid', paid_date: new Date().toISOString() });
                if (res?.success) { Utils.showToast('Invoice marked as paid', 'success'); loadInvoices(); }
                else Utils.showToast('Failed to update', 'error');
            } catch (e) { Utils.showToast(e.message, 'error'); }
        }
        function printInvoice() { window.print(); }
        function exportInvoices() { if (invoiceData.length) Utils.exportToCSV(invoiceData, 'invoices_' + new Date().toISOString().split('T')[0] + '.csv'); else Utils.showToast('No data to export', 'error'); }
        document.addEventListener('DOMContentLoaded', initPage);
    </script>
</body>
</html>

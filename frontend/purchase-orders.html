<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase Orders (ME21N) - Janstro Solar IMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="assets/css/main.css" rel="stylesheet">
</head>
<body>
    <button class="mobile-menu-toggle" aria-label="Toggle menu"><i class="bi bi-list"></i></button>
    <div id="sidebarContainer"></div>

    <div class="main-content">
        <div class="page-header">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                <div>
                    <h1>🛒 Purchase Orders (ME21N)</h1>
                    <p class="text-muted mb-0">Create and manage procurement orders</p>
                </div>
                <button class="btn btn-primary" onclick="showCreatePOModal()" id="btnCreatePO">
                    <i class="bi bi-plus-circle"></i> Create PO
                </button>
            </div>
        </div>

        <!-- Stats Cards -->
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="card text-center p-3">
                    <h3 id="statTotal" class="text-primary mb-1">0</h3>
                    <small class="text-muted">Total POs</small>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center p-3">
                    <h3 id="statPending" class="text-warning mb-1">0</h3>
                    <small class="text-muted">Pending</small>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center p-3">
                    <h3 id="statDelivered" class="text-success mb-1">0</h3>
                    <small class="text-muted">Delivered</small>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center p-3">
                    <h3 id="statValue" class="text-info mb-1">₱0</h3>
                    <small class="text-muted">Total Value</small>
                </div>
            </div>
        </div>

        <!-- Filters -->
        <div class="card mb-4">
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label for="searchPO" class="visually-hidden">Search PO</label>
                        <input type="text" id="searchPO" class="form-control" placeholder="🔍 Search PO#, supplier..." aria-label="Search purchase orders">
                    </div>
                    <div class="col-md-3">
                        <label for="statusFilter" class="visually-hidden">Filter by status</label>
                        <select id="statusFilter" class="form-control" aria-label="Filter by status">
                            <option value="">All Status</option>
                            <option value="pending">Pending</option>
                            <option value="approved">Approved</option>
                            <option value="delivered">Delivered</option>
                            <option value="cancelled">Cancelled</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label for="supplierFilter" class="visually-hidden">Filter by supplier</label>
                        <select id="supplierFilter" class="form-control" aria-label="Filter by supplier">
                            <option value="">All Suppliers</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button class="btn btn-primary w-100" onclick="loadPurchaseOrders()"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- PO Table -->
        <div class="card">
            <div class="card-header"><h3 class="mb-0">📋 Purchase Order List</h3></div>
            <div id="poTable" role="region" aria-live="polite"></div>
        </div>
    </div>

    <!-- Create PO Modal -->
    <div class="modal fade" id="createPOModal" tabindex="-1" aria-labelledby="createPOModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="createPOModalLabel">Create Purchase Order (ME21N)</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="poSupplier" class="form-label">Supplier <span class="text-danger">*</span></label>
                            <select id="poSupplier" class="form-control" required></select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="poItem" class="form-label">Item <span class="text-danger">*</span></label>
                            <select id="poItem" class="form-control" required></select>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="poQuantity" class="form-label">Quantity <span class="text-danger">*</span></label>
                            <input type="number" id="poQuantity" class="form-control" min="1" value="1" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="poUnitPrice" class="form-label">Unit Price (₱)</label>
                            <input type="number" id="poUnitPrice" class="form-control" step="0.01" min="0" readonly>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="poTotal" class="form-label">Total Amount</label>
                            <input type="text" id="poTotal" class="form-control" readonly>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="poExpectedDate" class="form-label">Expected Delivery</label>
                            <input type="date" id="poExpectedDate" class="form-control">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="poNotes" class="form-label">Notes</label>
                        <textarea id="poNotes" class="form-control" rows="2"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="createPurchaseOrder()"><i class="bi bi-save"></i> Create PO</button>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/rbac.js"></script>
    <script src="assets/js/sidebar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let poData = [], suppliers = [], items = [];

        async function initPage() {
            const res = await API.getCurrentUser();
            if (!res?.success) { window.location.href = 'index.html'; return; }
            RBAC.enforceActions('purchaseOrders', { 'create': '#btnCreatePO' });
            await Promise.all([loadSuppliers(), loadItems(), loadPurchaseOrders()]);
            setupListeners();
        }

        async function loadSuppliers() {
            const res = await API.getSuppliers();
            if (res?.success) {
                suppliers = res.data;
                let opts = '<option value="">Select Supplier</option>';
                let filter = '<option value="">All Suppliers</option>';
                suppliers.forEach(s => {
                    opts += `<option value="${s.supplier_id}">${Utils.escapeHtml(s.supplier_name)}</option>`;
                    filter += `<option value="${s.supplier_id}">${Utils.escapeHtml(s.supplier_name)}</option>`;
                });
                document.getElementById('poSupplier').innerHTML = opts;
                document.getElementById('supplierFilter').innerHTML = filter;
            }
        }

        async function loadItems() {
            const res = await API.getInventory();
            if (res?.success) {
                items = res.data;
                let opts = '<option value="">Select Item</option>';
                items.forEach(i => opts += `<option value="${i.item_id}" data-price="${i.unit_price}">${Utils.escapeHtml(i.item_name)} (${i.quantity} ${i.unit})</option>`);
                document.getElementById('poItem').innerHTML = opts;
            }
        }

        async function loadPurchaseOrders() {
            Utils.showLoading('poTable');
            const res = await API.getPurchaseOrders();
            if (res?.success) {
                poData = res.data;
                renderPOTable(poData);
                updateStats(poData);
            } else Utils.showError('poTable', 'Failed to load');
        }

        function renderPOTable(data) {
            if (!data.length) { document.getElementById('poTable').innerHTML = '<p class="text-center py-5 text-muted">No purchase orders found</p>'; return; }
            let html = `<div class="table-responsive"><table class="table table-hover">
                <thead><tr><th>PO#</th><th>Supplier</th><th>Item</th><th>Qty</th><th>Total</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead><tbody>`;
            data.forEach(po => {
                const badge = po.status === 'delivered' ? 'bg-success' : po.status === 'pending' ? 'bg-warning text-dark' : po.status === 'cancelled' ? 'bg-danger' : 'bg-info';
                html += `<tr>
                    <td><strong>PO-${String(po.po_id).padStart(4,'0')}</strong></td>
                    <td>${Utils.escapeHtml(po.supplier_name)}</td>
                    <td>${Utils.escapeHtml(po.item_name)}</td>
                    <td>${po.quantity}</td>
                    <td>${Utils.formatCurrency(po.total_amount)}</td>
                    <td><span class="badge ${badge}">${po.status}</span></td>
                    <td>${Utils.formatDate(po.po_date)}</td>
                    <td>
                        ${po.status === 'pending' ? `<button class="btn btn-sm btn-success" onclick="receiveGoods(${po.po_id})" title="Receive Goods"><i class="bi bi-box-arrow-in-down"></i></button>` : ''}
                        <button class="btn btn-sm btn-info" onclick="viewPO(${po.po_id})" title="View"><i class="bi bi-eye"></i></button>
                    </td>
                </tr>`;
            });
            html += '</tbody></table></div>';
            document.getElementById('poTable').innerHTML = html;
        }

        function updateStats(data) {
            document.getElementById('statTotal').textContent = data.length;
            document.getElementById('statPending').textContent = data.filter(p => p.status === 'pending').length;
            document.getElementById('statDelivered').textContent = data.filter(p => p.status === 'delivered').length;
            const total = data.reduce((sum, p) => sum + parseFloat(p.total_amount || 0), 0);
            document.getElementById('statValue').textContent = Utils.formatCurrency(total);
        }

        function setupListeners() {
            document.getElementById('searchPO').addEventListener('input', filterPOs);
            document.getElementById('statusFilter').addEventListener('change', filterPOs);
            document.getElementById('supplierFilter').addEventListener('change', filterPOs);
            document.getElementById('poItem').addEventListener('change', updatePOTotal);
            document.getElementById('poQuantity').addEventListener('input', updatePOTotal);
        }

        function filterPOs() {
            const search = document.getElementById('searchPO').value.toLowerCase();
            const status = document.getElementById('statusFilter').value;
            const supplier = document.getElementById('supplierFilter').value;
            const filtered = poData.filter(po => {
                const matchSearch = `PO-${po.po_id}`.toLowerCase().includes(search) || po.supplier_name?.toLowerCase().includes(search) || po.item_name?.toLowerCase().includes(search);
                const matchStatus = !status || po.status === status;
                const matchSupplier = !supplier || po.supplier_id == supplier;
                return matchSearch && matchStatus && matchSupplier;
            });
            renderPOTable(filtered);
        }

        function updatePOTotal() {
            const sel = document.getElementById('poItem');
            const qty = parseInt(document.getElementById('poQuantity').value) || 0;
            const price = parseFloat(sel.options[sel.selectedIndex]?.dataset?.price) || 0;
            document.getElementById('poUnitPrice').value = price.toFixed(2);
            document.getElementById('poTotal').value = Utils.formatCurrency(price * qty);
        }

        function showCreatePOModal() {
            document.getElementById('poSupplier').value = '';
            document.getElementById('poItem').value = '';
            document.getElementById('poQuantity').value = '1';
            document.getElementById('poUnitPrice').value = '';
            document.getElementById('poTotal').value = '';
            document.getElementById('poExpectedDate').value = new Date(Date.now() + 7*24*60*60*1000).toISOString().split('T')[0];
            document.getElementById('poNotes').value = '';
            new bootstrap.Modal(document.getElementById('createPOModal')).show();
        }

        async function createPurchaseOrder() {
            const data = {
                supplier_id: parseInt(document.getElementById('poSupplier').value),
                item_id: parseInt(document.getElementById('poItem').value),
                quantity: parseInt(document.getElementById('poQuantity').value),
                expected_delivery_date: document.getElementById('poExpectedDate').value,
                notes: document.getElementById('poNotes').value
            };
            if (!data.supplier_id || !data.item_id || !data.quantity) { Utils.showToast('Fill required fields', 'error'); return; }
            try {
                const res = await API.post('/purchase-orders', data);
                if (res?.success) {
                    Utils.showToast('PO created successfully', 'success');
                    bootstrap.Modal.getInstance(document.getElementById('createPOModal')).hide();
                    loadPurchaseOrders();
                } else Utils.showToast('Failed to create PO', 'error');
            } catch (e) { Utils.showToast(e.message, 'error'); }
        }

        async function receiveGoods(poId) {
            if (!confirm(`Receive goods for PO-${String(poId).padStart(4,'0')}?`)) return;
            try {
                const res = await API.post(`/purchase-orders/receive/${poId}`, {});
                if (res?.success) { Utils.showToast('Goods received! Stock updated.', 'success'); loadPurchaseOrders(); }
                else Utils.showToast('Failed to receive goods', 'error');
            } catch (e) { Utils.showToast(e.message, 'error'); }
        }

        function viewPO(poId) { Utils.showToast('View details coming soon', 'info'); }

        document.addEventListener('DOMContentLoaded', initPage);
    </script>
</body>
</html>
